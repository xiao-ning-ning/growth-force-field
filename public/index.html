<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>成长透镜</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@600;700&display=swap');

:root {
  --bg: #06070b;
  --bg2: #0c0d14;
  --card: #11121c;
  --card2: #181a28;
  --card3: #1e2033;
  --border: #1f2140;
  --border-light: #3d4270;
  --text: #f0f0f5;
  --text2: #b8b8c8;
  --text3: #7a7a90;
  --accent: #7c6cf0;
  --accent2: #b0a8ff;
  --green: #2dd4bf;
  --green2: #5eead4;
  --orange: #fbbf24;
  --red: #f87171;
  --pink: #f472b6;
  --blue: #60a5fa;
  --teal: #67e8f9;
  --glow-accent: rgba(124,108,240,0.15);
  --glow-green: rgba(45,212,191,0.12);
  --glow-red: rgba(248,113,113,0.12);
  --radius: 14px;
  --radius-sm: 10px;
  --radius-xs: 6px;
  --shadow: 0 2px 8px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.2);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.4), 0 2px 8px rgba(0,0,0,0.2);
  --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans SC', -apple-system, sans-serif;
  height: 100vh;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ===== LOGIN ===== */
.login-page {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; background: var(--bg);
}
.login-box {
  background: rgba(20, 21, 30, 0.85);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 48px 40px 36px;
  width: 380px;
  backdrop-filter: blur(30px);
}
.login-brand { text-align: center; margin-bottom: 32px; }
.login-icon { font-size: 48px; margin-bottom: 8px; }
.login-brand h1 {
  font-size: 28px; font-weight: 900; margin: 0;
  background: linear-gradient(135deg, #d8d4ff, #5eead4);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.login-brand p { font-size: 13px; color: var(--text3); margin: 4px 0 0; }
.login-form { display: flex; flex-direction: column; gap: 16px; }
.login-field label { display: block; font-size: 13px; color: var(--text2); margin-bottom: 6px; }
.login-field input {
  width: 100%; padding: 10px 14px; border-radius: 10px;
  border: 1px solid var(--border); background: rgba(255,255,255,0.04);
  color: var(--text); font-size: 14px; outline: none;
  transition: border-color 0.2s;
  -webkit-autofill-selected: transparent;
}
.login-field input:focus { border-color: var(--accent); }
.login-error {
  font-size: 13px; color: #f87171; text-align: center;
  padding: 8px; border-radius: 8px; background: rgba(248,113,113,0.08);
}
.login-form button[type="submit"] {
  padding: 12px; border: none; border-radius: 10px;
  background: linear-gradient(135deg, var(--accent), #7c3aed);
  color: #fff; font-size: 15px; font-weight: 600;
  cursor: pointer; transition: opacity 0.2s;
}
.login-form button[type="submit"]:hover { opacity: 0.9; }
.login-form button[type="submit"]:disabled { opacity: 0.5; cursor: not-allowed; }
.login-hint { text-align: center; font-size: 12px; color: var(--text3); margin-top: 20px; }
.sidebar-logout {
  display: block; width: 100%; padding: 10px 22px;
  background: none; border: none; border-top: 1px solid var(--border);
  color: var(--text3); font-size: 12px; cursor: pointer; text-align: left;
  transition: color 0.2s;
}
.sidebar-logout:hover { color: var(--text2); }

/* ===== LAYOUT ===== */
.app { display: flex; height: 100vh; }

.sidebar {
  width: 224px;
  background: linear-gradient(180deg, rgba(12,13,20,0.95), rgba(8,9,15,0.98));
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  z-index: 10;
}

.sidebar-brand {
  padding: 28px 22px 22px;
  border-bottom: 1px solid var(--border);
  position: relative;
}

.sidebar-brand::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 22px; right: 22px;
  height: 1px;
  background: linear-gradient(90deg, var(--accent), transparent);
  opacity: 0.3;
}

.sidebar-brand h1 {
  font-family: 'Noto Serif SC', serif;
  font-size: 22px;
  font-weight: 900;
  background: linear-gradient(135deg, #fff 0%, var(--accent2) 50%, var(--green2) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 4px;
  letter-spacing: 1px;
}

.sidebar-brand p {
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 2px;
  text-transform: uppercase;
}

.sidebar-nav { flex: 1; padding: 14px 10px; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
.sidebar-nav::-webkit-scrollbar { width: 4px; }
.sidebar-nav::-webkit-scrollbar-track { background: transparent; }
.sidebar-nav::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.sidebar-nav::-webkit-scrollbar-thumb:hover { background: var(--border-light); }

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: var(--transition);
  color: var(--text3);
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 2px;
  position: relative;
}
.nav-item:hover {
  background: rgba(124,108,240,0.08);
  color: var(--text2);
  transform: translateX(2px);
}
.nav-item.active {
  background: linear-gradient(135deg, rgba(124,108,240,0.14), rgba(124,108,240,0.06));
  color: var(--accent2);
  font-weight: 600;
}
.nav-item.active::before {
  content: '';
  position: absolute;
  left: 0; top: 50%;
  transform: translateY(-50%);
  width: 3px;
  height: 20px;
  border-radius: 0 3px 3px 0;
  background: var(--accent);
  box-shadow: 0 0 12px var(--glow-accent);
}
.nav-item .icon { font-size: 16px; width: 20px; text-align: center; transition: transform 0.2s; }
.nav-item:hover .icon { transform: scale(1.15); }
.nav-item.active .icon { filter: drop-shadow(0 0 4px var(--accent)); }

.sidebar-footer {
  padding: 16px 22px;
  border-top: 1px solid var(--border);
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 0.5px;
}
.sidebar-queue {
  flex: 1;
  overflow-y: auto;
  padding: 8px 12px;
  border-top: 1px solid var(--border);
  min-height: 0;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.sidebar-queue::-webkit-scrollbar { width: 4px; }
.sidebar-queue::-webkit-scrollbar-track { background: transparent; }
.sidebar-queue::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.sidebar-queue::-webkit-scrollbar-thumb:hover { background: var(--border-light); }
.sidebar-queue-title {
  font-size: 10px;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 4px;
}
.sidebar-queue-title .pulse {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
  animation: pulse 1.5s ease infinite;
  display: none;
}
.sidebar-queue-title .pulse.active { display: inline-block; }
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.7); }
}
.queue-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 10px;
  margin-bottom: 6px;
  font-size: 11px;
}
.queue-item-label {
  color: var(--text2);
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 4px;
}
.queue-item-label .dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  flex-shrink: 0;
}
.queue-item-label .dot.running { background: var(--accent); animation: pulse 1s ease infinite; }
.queue-item-label .dot.done { background: var(--green); }
.queue-item-label .dot.error { background: var(--red); }
.queue-progress {
  width: 100%;
  height: 3px;
  border-radius: 3px;
  background: var(--card2);
  overflow: hidden;
}
.queue-progress-fill {
  height: 100%;
  border-radius: 3px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  transition: width 0.4s ease;
}
.queue-progress-fill.done { background: var(--green); }
.queue-progress-fill.error { background: var(--red); }

.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

.btn {
  padding: 8px 18px;
  border-radius: var(--radius-xs);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text2);
  transition: var(--transition);
  font-family: inherit;
}
.btn:hover { border-color: var(--accent); color: var(--text); background: var(--card2); }
.btn.primary {
  background: linear-gradient(135deg, var(--accent), #6366f1);
  border-color: transparent;
  color: #fff;
  box-shadow: 0 2px 12px rgba(124,108,240,0.3);
}
.btn.primary:hover {
  box-shadow: 0 4px 20px rgba(124,108,240,0.45);
  transform: translateY(-1px);
}
.btn.danger { border-color: rgba(248,113,113,0.3); color: var(--red); }
.btn.danger:hover { background: var(--glow-red); border-color: var(--red); }
.btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; box-shadow: none; }

.content {
  flex: 1;
  overflow-y: auto;
  padding: 28px 36px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.content::-webkit-scrollbar { width: 6px; }
.content::-webkit-scrollbar-track { background: transparent; }
.content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.content::-webkit-scrollbar-thumb:hover { background: var(--border-light); }

/* ===== VIEWS ===== */
.view { display: none; }
.view.active { display: block; }

/* ===== HOME VIEW ===== */
.home-hero {
  text-align: center;
  padding: 48px 0 24px;
  position: relative;
}
.home-hero::before {
  content: '';
  position: absolute;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: 300px;
  height: 200px;
  background: radial-gradient(ellipse, rgba(124,108,240,0.08), rgba(45,212,191,0.04), transparent 70%);
  pointer-events: none;
  z-index: 0;
}
.home-hero-icon {
  font-size: 52px;
  margin-bottom: 14px;
  position: relative;
  filter: drop-shadow(0 4px 12px rgba(124,108,240,0.2));
}
.home-hero h2 {
  font-family: 'Noto Serif SC', serif;
  font-size: 42px;
  font-weight: 900;
  background: linear-gradient(135deg, #fff 0%, #d8d4ff 35%, #5eead4 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 12px;
  letter-spacing: 6px;
  position: relative;
}
.home-hero p {
  font-size: 14px;
  color: var(--text2);
  line-height: 1.8;
  max-width: 480px;
  margin: 0 auto;
  position: relative;
}
.home-hero .home-motto {
  font-family: 'Noto Serif SC', serif;
  font-size: 18px;
  color: var(--text);
  margin-top: 16px;
  line-height: 2;
  letter-spacing: 0.5px;
  font-style: italic;
}

.home-section {
  margin: 30px 0;
}
.home-section h3 {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--text);
}
.home-section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
  flex-wrap: wrap;
  gap: 8px;
}
.home-section-header h3 {
  margin-bottom: 0;
}
.home-stats {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.stat-badge {
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 20px;
  cursor: pointer;
  transition: var(--transition);
  font-weight: 600;
  border: 1px solid transparent;
}
.stat-badge:hover { transform: scale(1.06); }
.stat-badge.possessed { background: rgba(45,212,191,0.15); color: #5eead4; border-color: rgba(45,212,191,0.3); }
.stat-badge.developing { background: rgba(244,114,182,0.15); color: #f9a8d4; border-color: rgba(244,114,182,0.3); }
.stat-badge.combo { background: rgba(124,108,240,0.15); color: #c4b5fd; border-color: rgba(124,108,240,0.3); }
.stat-badge.blind { background: rgba(248,113,113,0.15); color: #fca5a5; border-color: rgba(248,113,113,0.3); }

.home-guide {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
}
.guide-card {
  background: linear-gradient(145deg, var(--card), var(--card2));
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 22px;
  cursor: pointer;
  transition: var(--transition);
  position: relative;
  overflow: hidden;
}
.guide-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(124,108,240,0.3), transparent);
  opacity: 0;
  transition: opacity 0.3s;
}
.guide-card:hover {
  border-color: var(--border-light);
  transform: translateY(-3px);
  box-shadow: var(--shadow-lg);
}
.guide-card:hover::before { opacity: 1; }
.guide-card .step-num {
  width: 32px; height: 32px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700;
  margin-bottom: 12px;
}
.guide-card .step-num.s1 { background: rgba(108,92,231,0.15); color: var(--accent2); }
.guide-card .step-num.s2 { background: rgba(0,206,201,0.15); color: var(--green); }
.guide-card .step-num.s3 { background: rgba(253,203,110,0.15); color: var(--orange); }
.guide-card h4 { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
.guide-card p { font-size: 12px; color: var(--text2); line-height: 1.6; }

.home-radar-wrap {
  display: flex;
  gap: 20px;
  align-items: stretch;
}
.home-radar-chart {
  flex: 0 0 auto;
  background: linear-gradient(145deg, var(--card), var(--card2));
  border-radius: var(--radius);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 14px;
  align-self: stretch;
  position: relative;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.02);
}
.home-radar-chart canvas {
  display: block;
  max-width: 100%;
}
.home-radar-legend { flex: 1; min-width: 200px; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
.home-radar-legend::-webkit-scrollbar { width: 4px; }
.home-radar-legend::-webkit-scrollbar-track { background: transparent; }
.home-radar-legend::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.home-radar-legend::-webkit-scrollbar-thumb:hover { background: var(--border-light); }

.home-upgrade {
  background: linear-gradient(145deg, var(--card), var(--card2));
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
}
.upgrade-path {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  background: rgba(251,191,36,0.03);
  border: 1px solid rgba(251,191,36,0.08);
  border-radius: var(--radius-sm);
  margin-bottom: 10px;
  transition: var(--transition);
  cursor: pointer;
}
.upgrade-path:last-child { margin-bottom: 0; }
.upgrade-path:hover {
  border-color: rgba(251,191,36,0.25);
  background: rgba(251,191,36,0.06);
  transform: translateX(4px);
}
.upgrade-from {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 10px; border-radius: 6px;
  background: rgba(253,203,110,0.1);
  font-size: 12px; color: var(--orange); font-weight: 600;
}
.upgrade-arrow { color: var(--text3); font-size: 16px; }
.upgrade-to {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 10px; border-radius: 6px;
  background: rgba(0,206,201,0.1);
  font-size: 12px; color: var(--green); font-weight: 600;
}
.upgrade-reason { font-size: 12px; color: var(--text3); margin-left: auto; max-width: 200px; text-align: right; }

/* ===== ANALYZE VIEW ===== */
.analyze-layout { max-width: 900px; }

.form-group { margin-bottom: 20px; }
.form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 8px; }
.form-input {
  width: 100%;
  padding: 11px 14px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 13px;
  font-family: inherit;
  transition: var(--transition);
}
.form-input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--glow-accent);
}
textarea.form-input { min-height: 300px; resize: vertical; line-height: 1.7; }
.file-upload-zone { border: 2px dashed var(--border); border-radius: 12px; padding: 32px; text-align: center; cursor: pointer; transition: all 0.2s; }
.file-upload-zone:hover, .file-upload-zone.drag-over { border-color: var(--accent); background: rgba(108, 92, 231, 0.05); }
.file-upload-placeholder { color: var(--text3); font-size: 14px; }
.file-upload-info { display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--text); }
.file-remove { margin-left: auto; cursor: pointer; opacity: 0.5; font-size: 16px; }
.file-remove:hover { opacity: 1; color: var(--red); }

.form-row { display: flex; gap: 16px; }
.form-row .form-group { flex: 1; }

.analyze-result {
  margin-top: 24px;
  padding: 22px;
  background: linear-gradient(145deg, var(--card), var(--card2));
  border-radius: var(--radius);
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
}
.analyze-result h3 { font-size: 15px; font-weight: 700; margin-bottom: 12px; color: var(--accent2); }
.analyze-result p { font-size: 13px; color: var(--text2); line-height: 1.7; }
.result-item { padding: 10px 0; border-bottom: 1px solid var(--border); }
.result-item:last-child { border-bottom: none; }
.result-tag {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
  margin-right: 6px;
}
.result-tag.new { background: rgba(0,206,201,0.12); color: var(--green2); }
.result-tag.update { background: rgba(108,92,231,0.12); color: var(--accent2); }
.result-tag.possessed { background: rgba(0,206,201,0.1); color: var(--green); }
.result-tag.developing { background: rgba(253,203,110,0.1); color: var(--orange); }

/* ===== MAP VIEW ===== */
.map-layout { display: flex; gap: 24px; }

.map-col { flex: 1; min-width: 0; }
.map-col-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
.map-col-header h3 { font-size: 16px; font-weight: 700; }
.map-col-header .count {
  font-size: 11px;
  padding: 2px 10px;
  border-radius: 20px;
  font-weight: 700;
}
.map-col-header.possessed .count { background: rgba(0,206,201,0.12); color: var(--green); }
.map-col-header.developing .count { background: rgba(253,203,110,0.12); color: var(--orange); }

.category-panel { margin-bottom: 8px; }
.category-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 11px 14px;
  background: linear-gradient(135deg, var(--card), rgba(17,18,28,0.8));
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: var(--transition), background 0.2s ease, transform 0.2s ease;
  font-size: 13px;
  font-weight: 600;
  color: var(--text2);
  user-select: none;
  border: 1px solid transparent;
}
.category-header:hover {
  background: linear-gradient(135deg, rgba(124,108,240,0.08), var(--card));
  color: var(--text);
  transform: translateX(2px);
}
.category-header:hover {
  background: var(--card2);
  border-color: var(--border);
}
.category-header.open {
  background: var(--card2);
  border-color: var(--border);
  border-radius: var(--radius-sm) var(--radius-sm) 0 0;
  color: var(--text);
}
.category-header .arrow {
  display: inline-block;
  transition: transform 0.2s;
  font-size: 10px;
  color: var(--text3);
  margin-right: 2px;
}
.category-header.open .arrow { transform: rotate(90deg); }
.category-header .cat-icon { font-size: 14px; }
.category-header .cat-desc {
  font-size: 11px;
  color: var(--text3);
  font-weight: 400;
  margin-left: 4px;
}

.category-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease;
  padding: 0 0 0 0;
}
.category-body.open {
  max-height: 2000px;
  padding: 6px 0 4px 0;
}

.dim-card {
  background: linear-gradient(160deg, var(--card), var(--card2));
  border: 1px solid var(--border-light);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  margin-bottom: 6px;
  cursor: pointer;
  position: relative;
  transition: var(--transition), transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.25s ease;
}
.dim-card:hover {
  border-color: rgba(124,108,240,0.35);
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(0,0,0,0.3), 0 0 0 1px rgba(124,108,240,0.12);
}
.dim-card.possessed { border-left: 3px solid var(--green); }
.dim-card.developing { border-left: 3px solid var(--orange); }

.dim-card-head {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 4px;
}
.dim-card-name { font-size: 14px; font-weight: 700; color: #fff; }
.dim-stars { font-size: 12px; color: var(--orange); letter-spacing: 1px; display: inline-flex; align-items: center; gap: 3px; }
.dim-stars .star-count { font-weight: 700; color: var(--accent); font-size: 13px; }
.dim-card-desc { font-size: 12px; color: var(--text2); line-height: 1.5; }
.dim-card-delete {
  position: absolute;
  top: 10px; right: 10px;
  width: 22px; height: 22px;
  border-radius: 6px;
  display: none;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  background: rgba(255,118,117,0.1);
  color: var(--red);
  cursor: pointer;
  border: none;
}
.dim-card:hover .dim-card-delete { display: flex; }

/* Upgrade badge on developing cards */
.dim-upgrade-badge {
  display: inline-block;
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 4px;
  background: rgba(0,206,201,0.08);
  color: var(--green);
  margin-left: 6px;
  font-weight: 600;
}

/* Dimension Detail Modal */
.modal-overlay {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.65);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  z-index: 1000;
  display: none;
  align-items: center;
  justify-content: center;
  animation: fadeIn 0.2s ease;
}
.modal-overlay.open { display: flex; }

.modal {
  background: linear-gradient(180deg, var(--bg2), var(--card));
  border: 1px solid var(--border-light);
  border-radius: 20px;
  width: 700px;
  max-height: 80vh;
  overflow-y: auto;
  padding: 32px;
  box-shadow: var(--shadow-lg), 0 0 60px rgba(0,0,0,0.3);
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
  animation: modalIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.modal-box::-webkit-scrollbar { width: 4px; }
.modal-box::-webkit-scrollbar-track { background: transparent; }
.modal-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.modal-box::-webkit-scrollbar-thumb:hover { background: var(--border-light); }
@keyframes modalIn {
  from { opacity: 0; transform: scale(0.95) translateY(10px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
.modal h3 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
.modal-status {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
  margin-bottom: 14px;
}
.modal-status.possessed { background: rgba(0,206,201,0.12); color: var(--green); }
.modal-status.developing { background: rgba(253,203,110,0.12); color: var(--orange); }
.modal-desc { font-size: 14px; color: var(--text2); line-height: 1.7; margin-bottom: 20px; }
.modal-section { margin-bottom: 18px; }
.modal-section h4 { font-size: 13px; font-weight: 700; color: var(--accent2); margin-bottom: 10px; }

.evidence-item {
  padding: 14px;
  background: var(--card);
  border-radius: var(--radius-xs);
  margin-bottom: 8px;
  border-left: 2px solid var(--accent);
  transition: var(--transition);
}
.evidence-item:hover { background: var(--card2); }
.evidence-item.developing { border-left-color: var(--orange); }
.evidence-quote { font-size: 13px; color: var(--text); line-height: 1.7; margin-bottom: 6px; font-style: italic; }
.evidence-meta { font-size: 11px; color: var(--text3); }
.evidence-interpretation { font-size: 12px; color: var(--text2); line-height: 1.6; margin-top: 6px; padding-top: 6px; border-top: 1px dashed var(--border); }
.evidence-corrected { font-size: 10px; color: var(--green); margin-top: 4px; }
.evidence-polarity { display: inline-block; font-size: 11px; padding: 1px 6px; border-radius: 10px; margin-right: 6px; vertical-align: middle; }
.evidence-polarity.positive { background: rgba(45,212,191,0.15); color: var(--green2); }
.evidence-polarity.negative { background: rgba(248,113,113,0.15); color: var(--red); }
.evidence-actions { margin-top: 4px; display: flex; gap: 4px; }
.evidence-edit-textarea { width: 100%; background: var(--bg2); color: var(--text); border: 1px solid var(--accent); border-radius: 6px; padding: 6px 8px; font-size: 12px; line-height: 1.5; resize: vertical; font-family: inherit; }
.evidence-raw { font-size: 11px; color: var(--text3); text-decoration: line-through; margin-bottom: 4px; }

.related-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.related-tag {
  font-size: 11px;
  padding: 4px 12px;
  border-radius: 20px;
  background: rgba(124,108,240,0.08);
  color: var(--accent2);
  cursor: pointer;
  border: 1px solid rgba(124,108,240,0.15);
  transition: var(--transition);
}
.related-tag:hover { background: rgba(124,108,240,0.16); border-color: rgba(124,108,240,0.3); }

/* Upgrade path in modal */
.modal-upgrade {
  padding: 14px;
  background: rgba(253,203,110,0.04);
  border: 1px solid rgba(253,203,110,0.15);
  border-radius: 10px;
  margin-bottom: 16px;
}
.modal-upgrade h4 { font-size: 13px; font-weight: 700; color: var(--orange); margin-bottom: 6px; }
.modal-upgrade p { font-size: 12px; color: var(--text2); line-height: 1.6; }

/* Delete Bar */
.delete-bar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(255,118,117,0.08);
  border: 1px solid rgba(255,118,117,0.2);
  border-radius: 10px;
  padding: 10px 16px;
  margin-bottom: 16px;
  display: none;
  align-items: center;
  gap: 10px;
}
.delete-bar.visible { display: flex; }
.delete-bar-label { font-size: 12px; color: var(--red); font-weight: 600; flex: 1; }
.delete-tag {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 3px 8px;
  border-radius: 4px;
  background: rgba(255,118,117,0.12);
  font-size: 11px;
  color: var(--red);
}
.delete-tag .x { cursor: pointer; font-weight: 700; }

/* ===== COMBOS VIEW ===== */
.combos-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 18px;
}

.combo-card {
  background: linear-gradient(160deg, var(--card), var(--card2));
  border: 1px solid var(--border-light);
  border-radius: var(--radius);
  padding: 26px;
  position: relative;
  overflow: hidden;
  transition: var(--transition), transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.25s ease;
}
.combo-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--accent), var(--green), transparent);
}
.combo-card:hover {
  border-color: rgba(0,206,201,0.4);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.3), 0 0 0 1px rgba(0,206,201,0.15);
}
.combo-name { font-family: 'Noto Serif SC', serif; font-size: 20px; font-weight: 700; margin-bottom: 10px; }
.combo-dims { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
.combo-dim-tag {
  font-size: 11px;
  padding: 4px 12px;
  border-radius: 20px;
  background: rgba(124,108,240,0.08);
  color: var(--accent2);
  border: 1px solid rgba(124,108,240,0.15);
  cursor: pointer;
  transition: var(--transition);
}
.combo-dim-tag:hover { background: rgba(124,108,240,0.18); border-color: rgba(124,108,240,0.35); }
.combo-desc { font-size: 13px; color: var(--text2); line-height: 1.7; margin-bottom: 12px; }
.combo-why {
  padding: 12px;
  background: rgba(0,206,201,0.04);
  border-radius: 8px;
  border-left: 2px solid var(--green);
  font-size: 12px;
  color: var(--text2);
  line-height: 1.7;
  margin-bottom: 10px;
}
.combo-scenes { font-size: 12px; color: var(--text3); }
.combo-scenes b { color: var(--green2); }

/* ===== BLINDSPOTS VIEW ===== */
.blinds-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 18px;
}

.blind-card {
  background: linear-gradient(160deg, var(--card), var(--card2));
  border: 1px solid var(--border-light);
  border-radius: var(--radius);
  padding: 26px;
  position: relative;
  overflow: hidden;
  transition: var(--transition), transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.25s ease;
  cursor: pointer;
}
.blind-card:hover {
  border-color: rgba(248,113,113,0.4);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.3), 0 0 0 1px rgba(248,113,113,0.15);
}
.blind-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--red), var(--orange), transparent);
}
.blind-confidence {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
  margin-bottom: 10px;
}
.blind-confidence.强 { background: rgba(255,118,117,0.15); color: var(--red); }
.blind-confidence.中 { background: rgba(253,203,110,0.15); color: var(--orange); }
.blind-confidence.弱 { background: rgba(253,203,110,0.08); color: var(--orange); }
.dim-delete-btn { font-size: 14px; color: var(--text3); cursor: pointer; padding: 2px 6px; border-radius: 4px; transition: all 0.2s; line-height: 1; opacity: 0; pointer-events: none; }
.dim-card:hover .dim-delete-btn,
.blind-card:hover .dim-delete-btn { opacity: 1; pointer-events: auto; }
.dim-delete-btn:hover { color: var(--red); background: rgba(255,100,100,0.1); }
.dim-selected { outline: 2px solid var(--red) !important; background: rgba(255,100,100,0.06) !important; }
.dim-card:hover .dim-selected { outline: 2px solid var(--red) !important; }
.blind-card:hover .dim-selected { outline: 2px solid var(--red) !important; }
.blind-card h3 { font-size: 17px; font-weight: 700; margin-bottom: 10px; }
.blind-card p { font-size: 13px; color: var(--text2); line-height: 1.7; margin-bottom: 12px; }
.blind-evidence-card {
  padding: 10px 12px;
  background: rgba(255,118,117,0.04);
  border-radius: 8px;
  border-left: 2px solid var(--red);
  font-size: 12px;
  color: var(--text3);
  line-height: 1.6;
  margin-bottom: 8px;
}
.blind-evidence-card b { color: var(--text2); }
.blind-related { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
.blind-related-label { font-size: 11px; color: var(--text3); }

/* ===== PATHS VIEW ===== */
.paths-list { display: flex; flex-direction: column; gap: 20px; }

.path-card {
  background: linear-gradient(160deg, var(--card), var(--card2));
  border: 1px solid var(--border-light);
  border-radius: var(--radius);
  padding: 26px;
  transition: var(--transition), transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.25s ease;
}
.path-card:hover {
  border-color: rgba(45,212,191,0.4);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.3), 0 0 0 1px rgba(45,212,191,0.15);
}
.path-header { margin-bottom: 16px; }
.path-header h3 { font-size: 17px; font-weight: 700; margin-bottom: 6px; }
.path-gap { font-size: 13px; color: var(--text2); margin-bottom: 8px; line-height: 1.6; }
.path-leverages { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 4px; }
.path-leverage-tag {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 4px;
  background: rgba(0,206,201,0.1);
  color: var(--teal);
}
.path-outcome {
  font-size: 12px;
  color: var(--green);
  padding: 8px 12px;
  background: rgba(0,206,201,0.04);
  border-radius: 6px;
  border-left: 2px solid var(--green);
  margin-top: 4px;
}

.path-steps { display: flex; flex-direction: column; gap: 12px; }
.path-step {
  display: flex;
  gap: 14px;
  padding: 16px;
  background: rgba(0,206,201,0.03);
  border-radius: 10px;
  border: 1px solid rgba(0,206,201,0.08);
}
.path-step-num {
  flex-shrink: 0;
  width: 30px; height: 30px;
  border-radius: 50%;
  background: rgba(0,206,201,0.1);
  color: var(--green);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 700;
}
.path-step-content { flex: 1; }
.path-step h4 { font-size: 14px; font-weight: 700; color: #fff; margin-bottom: 6px; }
.path-step .detail { font-size: 13px; color: var(--text2); line-height: 1.7; margin-bottom: 6px; }
.path-step .leverage {
  font-size: 11px;
  color: var(--teal);
  padding: 4px 10px;
  background: rgba(0,206,201,0.06);
  border-radius: 4px;
  display: inline-block;
}

/* ===== TIMELINE VIEW ===== */
.timeline { position: relative; padding-left: 40px; max-width: 800px; }
.timeline::before {
  content: '';
  position: absolute;
  left: 14px; top: 0; bottom: 0;
  width: 2px;
  background: linear-gradient(180deg, var(--accent), var(--green), transparent);
}
.timeline-item {
  position: relative;
  margin-bottom: 28px;
  padding-left: 30px;
}
.timeline-dot {
  position: absolute;
  left: -33px; top: 6px;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--accent);
  border: 3px solid var(--bg);
  box-shadow: 0 0 0 2px var(--accent), 0 0 12px var(--glow-accent);
}
.timeline-date { font-size: 13px; color: var(--accent2); font-weight: 700; margin-bottom: 4px; }
.timeline-source { font-size: 12px; color: var(--text3); margin-bottom: 8px; }
.timeline-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
.timeline-tag {
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 20px;
  cursor: pointer;
}
.timeline-tag.possessed { border: 1px solid rgba(0,206,201,0.2); background: rgba(0,206,201,0.05); color: var(--green2); }
.timeline-tag.developing { border: 1px solid rgba(253,203,110,0.2); background: rgba(253,203,110,0.05); color: var(--orange); }
.timeline-summary { font-size: 13px; color: var(--text2); line-height: 1.6; }

/* ===== RADAR SHARED ===== */
.radar-legend { flex: 1; min-width: 280px; display: flex; flex-direction: column; gap: 10px; }
.radar-legend-item {
  display: flex; gap: 14px; padding: 12px 16px;
  background: linear-gradient(135deg, var(--card), var(--card2));
  border-radius: var(--radius-sm); border: 1px solid var(--border);
  transition: var(--transition);
}
.radar-legend-item:hover {
  border-color: var(--border-light);
  background: var(--card2);
}
.radar-color { width: 4px; border-radius: 2px; flex-shrink: 0; }
.radar-legend-name { font-size: 14px; font-weight: 700; color: #fff; margin-bottom: 2px; }
.radar-legend-desc { font-size: 12px; color: var(--text3); }
.dim-link { transition: all 0.15s ease; }
.dim-link:hover { filter: brightness(1.3); transform: scale(1.05); }
.radar-legend-count { font-size: 11px; color: var(--text3); }
.radar-blind-tag {
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 4px;
  background: rgba(255,118,117,0.08);
  color: var(--red);
  margin-left: 4px;
}

/* ===== SETTINGS VIEW ===== */
.settings-layout { max-width: 600px; }
.settings-card {
  background: linear-gradient(160deg, var(--card), var(--card2));
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 26px;
  margin-bottom: 18px;
}
.settings-card h3 { font-size: 16px; font-weight: 700; margin-bottom: 14px; }

/* ===== EMPTY STATE ===== */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text3);
}
.empty-state .icon { font-size: 48px; margin-bottom: 16px; }
.empty-state h3 { font-size: 18px; color: var(--text2); margin-bottom: 8px; }
.empty-state p { font-size: 13px; line-height: 1.7; }

/* ===== LOADING ===== */
.loading {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 20px;
  color: var(--text3);
  font-size: 13px;
}
.spinner {
  width: 18px; height: 18px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
}
/* Progress bar for async operations */
.progress-bar-wrap {
  width: 100%;
  margin: 12px 0;
  border-radius: 6px;
  overflow: hidden;
  background: var(--card2);
  height: 4px;
}
.progress-bar-fill {
  height: 100%;
  border-radius: 6px;
  background: linear-gradient(90deg, var(--accent), var(--accent2), var(--green));
  background-size: 200% 100%;
  animation: progressShimmer 1.5s ease infinite;
  transition: width 0.4s ease;
}
@keyframes progressShimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}
.loading-with-progress {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  padding: 30px;
  color: var(--text2);
  font-size: 13px;
}
.spinner {
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  box-shadow: 0 0 8px var(--glow-accent);
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== TOAST ===== */
.toast-container {
  position: fixed;
  top: 20px; right: 20px;
  z-index: 2000;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.toast {
  padding: 12px 18px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 500;
  animation: slideIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  max-width: 400px;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.toast.success { background: rgba(45,212,191,0.12); color: var(--green2); border: 1px solid rgba(45,212,191,0.25); }
.toast.error { background: rgba(248,113,113,0.12); color: var(--red); border: 1px solid rgba(248,113,113,0.25); }
.toast.info { background: rgba(124,108,240,0.12); color: var(--accent2); border: 1px solid rgba(124,108,240,0.25); }
@keyframes slideIn { from { opacity: 0; transform: translateX(30px) scale(0.95); } to { opacity: 1; transform: translateX(0) scale(1); } }

/* ===== RESPONSIVE ===== */
@media (max-width: 1100px) {
  .home-guide { grid-template-columns: repeat(2, 1fr); }
  .home-radar-wrap { flex-direction: column; align-items: center; }
}
@media (max-width: 900px) {
  .sidebar { width: 60px; }
  .sidebar-brand h1, .sidebar-brand p, .nav-item span, .sidebar-footer { display: none; }
  .nav-item { justify-content: center; padding: 10px; }
  .map-layout { flex-direction: column; }
  .combos-grid, .blinds-grid { grid-template-columns: 1fr; }
  .home-guide { grid-template-columns: repeat(2, 1fr); }
  .home-radar-wrap { flex-direction: column; align-items: center; }
  .home-upgrade { display: none; }
}

/* ===== USER EDIT MODAL ===== */
.user-edit-modal {
  width: 420px;
  padding: 28px;
}
.user-edit-modal h3 {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 4px;
  color: var(--text);
}
.user-edit-modal .user-edit-hint {
  font-size: 12px;
  color: var(--text3);
  margin-bottom: 20px;
}
.form-group {
  margin-bottom: 14px;
}
.form-group label {
  display: block;
  font-size: 12px;
  color: var(--text2);
  margin-bottom: 6px;
  font-weight: 600;
}
.form-input {
  width: 100%;
  padding: 8px 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg2);
  color: var(--text);
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}
.form-input:focus { border-color: var(--accent); }
.form-hint { font-size: 11px; color: var(--text3); margin-top: 4px; }
.user-edit-actions {
  display: flex;
  gap: 10px;
  margin-top: 20px;
  justify-content: flex-end;
}

/* timeline */
.timeline { display:flex;flex-direction:column;gap:0;padding-left:24px;border-left:2px solid var(--border);margin-left:8px }
.timeline-item { position:relative;padding:16px 0 16px 28px }
.timeline-item::before{content:'';position:absolute;left:-7px;top:22px;width:12px;height:12px;border-radius:50%;background:var(--accent);border:2px solid var(--bg)}
.timeline-dot{display:none}
.timeline-date{font-size:13px;font-weight:700;color:var(--accent);margin-bottom:4px}
.timeline-source{font-size:12px;color:var(--text3);margin-bottom:8px}
.timeline-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.timeline-tag{display:inline-block;padding:2px 8px;border-radius:12px;font-size:12px;cursor:pointer}
.timeline-tag.possessed{background:var(--glow-green);color:var(--green);border:1px solid rgba(45,212,191,0.3)}
.timeline-tag.developing{background:rgba(251,191,36,0.1);color:var(--orange);border:1px solid rgba(251,191,36,0.25)}
.timeline-tag.blind{background:var(--glow-red);color:var(--red);border:1px solid rgba(248,113,113,0.3)}
.timeline-summary{font-size:13px;color:var(--text2);line-height:1.6}

/* track */
.track-wrap { max-width:1100px }
.track-loading { color:var(--text3);padding:16px;font-size:13px }
.track-admin-panel { background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:32px }
.track-admin-header { display:flex;align-items:center;justify-content:space-between;margin-bottom:16px }
.track-admin-header h3 { margin:0;font-size:16px }
.track-timeline { overflow-x:auto }
.track-dim-table-wrap { overflow-x:auto;margin-bottom:24px }
.track-dim-table { width:100%;border-collapse:collapse;font-size:13px;min-width:600px }
.track-dim-table th { padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);color:var(--text2);white-space:nowrap;font-weight:600 }
.track-dim-table td { padding:8px 12px;border-bottom:1px solid rgba(255,255,255,0.04);vertical-align:middle }
.track-date-col { min-width:80px;font-size:11px }
.track-dim-name { font-weight:600;color:var(--text);cursor:pointer }
.track-dim-name:hover { color:var(--accent) }
.track-state { border-radius:10px;text-align:center;font-size:12px;padding:4px 8px;white-space:nowrap }
.track-state.possessed { background:rgba(45,212,191,0.12);color:var(--green) }
.track-state.developing { background:rgba(251,191,36,0.1);color:var(--orange) }
.track-state.blind { background:rgba(248,113,113,0.1);color:var(--red) }
.track-state.no_data { background:var(--card3);color:var(--text3) }
.track-state.changed { font-weight:700 }
.track-change-arrow { font-size:10px;color:var(--accent);margin-top:2px }
.track-records { display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px }
.track-record-card { background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px }
.track-record-header { display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-bottom:12px }
.track-record-delete { background:none;border:none;color:var(--text3);cursor:pointer;font-size:12px;padding:4px 8px;border-radius:6px;transition:all 0.2s }
.track-record-delete:hover { background:rgba(248,113,113,0.1);color:var(--red) }
.track-record-date { font-size:13px;font-weight:700;color:var(--accent) }
.track-record-source { font-size:12px;color:var(--text3) }
.track-record-badge { background:rgba(45,212,191,0.1);color:var(--green);border:1px solid rgba(45,212,191,0.25);border-radius:10px;padding:2px 8px;font-size:11px;margin-left:auto }
.track-record-findings { margin-bottom:10px }
.track-finding { font-size:12px;color:var(--text2);line-height:1.6;padding:2px 0 }
.track-record-summary { font-size:12px;color:var(--text3);line-height:1.6;margin-bottom:10px }
.track-record-dims { display:flex;flex-wrap:wrap;gap:6px }
.track-record-tag { display:inline-block;padding:2px 8px;border-radius:10px;font-size:12px;cursor:pointer;transition:all 0.15s }
.track-record-tag:hover { transform:translateY(-1px);filter:brightness(1.15) }
.track-record-tag.possessed { background:rgba(45,212,191,0.12);color:var(--green) }
.track-record-tag.developing { background:rgba(251,191,36,0.1);color:var(--orange) }
.track-record-tag.blind { background:rgba(248,113,113,0.1);color:var(--red) }

.track-chart-section { margin-bottom: 32px }
.track-chart-title { font-size: 16px; font-weight: 700; margin-bottom: 4px }
.track-chart-sub { font-size: 12px; color: var(--text3); margin-bottom: 16px }
.track-chart-wrap { position: relative; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 12px }
.track-chart-canvas { width: 100%; display: block; }
.track-chart-tooltip {
  position: absolute; background: var(--card2); border: 1px solid var(--border-light);
  border-radius: 8px; padding: 10px 12px; font-size: 12px; color: var(--text);
  pointer-events: none; opacity: 0; transition: opacity 0.15s; z-index: 100;
  min-width: 160px; max-width: 220px; box-shadow: var(--shadow-lg);
}
.track-chart-tooltip.show { opacity: 1; }
.track-chart-legend { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 20px }
.track-chart-legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text2) }
.track-chart-legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0 }

.track-records-by-day { margin-top: 8px }
.track-day-group { margin-bottom: 28px }
.track-day-label { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border) }
.track-day-date { font-size: 14px; font-weight: 700; color: var(--accent) }
.track-day-count { font-size: 12px; color: var(--text3); background: var(--card3); border-radius: 10px; padding: 2px 8px }
.track-day-cards { display: flex; flex-direction: column; gap: 10px }

/* Guide suggestions hover */
.guide-suggestion:hover { border-color: var(--accent) !important; background: var(--card3) !important; }

/* Path step checked state */
.path-step.step-checked { opacity: 0.6; }
.path-card.completed { opacity: 0.7; border-color: var(--green) !important; }

/* ===== DEEP THINK VIEW ===== */
.deepthink-layout {
  display: flex;
  height: calc(100vh - 56px);
  padding: 20px 16px;
  gap: 0;
  overflow: hidden;
}

/* Three panels + two resize handles */
.deepthink-left, .deepthink-middle, .deepthink-right {
  flex-shrink: 0;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.deepthink-left  { width: 300px; }
.deepthink-middle { flex: 1; min-width: 200px; }
.deepthink-right { width: 280px; }

/* Resize handles (gutter dividers) */
.deepthink-gutter {
  flex-shrink: 0;
  width: 16px;
  cursor: col-resize;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  user-select: none;
}
.deepthink-gutter::before {
  content: '';
  width: 3px;
  height: 40px;
  border-radius: 2px;
  background: var(--border);
  transition: background 0.2s;
}
.deepthink-gutter:hover::before,
.deepthink-gutter.dragging::before {
  background: var(--accent);
}
.deepthink-gutter.dragging {
  cursor: col-resize;
}
body.deepthink-resizing { cursor: col-resize !important; user-select: none; }
body.deepthink-resizing * { cursor: col-resize !important; pointer-events: none; }
body.deepthink-resizing .deepthink-gutter { pointer-events: auto; }

/* Left: Analysis Results */
.deepthink-left {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
}
.deepthink-left-header {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.deepthink-left-header h3 {
  font-size: 13px;
  font-weight: 700;
  color: var(--accent2);
  display: flex;
  align-items: center;
  gap: 6px;
}
.deepthink-left-body {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.deepthink-left-body::-webkit-scrollbar { width: 4px; }
.deepthink-left-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.deepthink-analysis-loading {
  text-align: center;
  padding: 32px 16px;
  color: var(--text3);
  font-size: 13px;
}
.deepthink-analysis-empty {
  text-align: center;
  padding: 32px 16px;
  color: var(--text3);
  font-size: 13px;
  line-height: 1.8;
}
.deepthink-analysis-content {
  font-size: 13px;
  line-height: 1.8;
  color: var(--text2);
}
.deepthink-analysis-content h1,
.deepthink-analysis-content h2,
.deepthink-analysis-content h3 {
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  margin: 16px 0 8px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}
.deepthink-analysis-content h4 { font-size: 13px; font-weight: 700; color: var(--text); margin: 12px 0 6px; }
.deepthink-analysis-content h1:first-child,
.deepthink-analysis-content h2:first-child,
.deepthink-analysis-content h3:first-child { margin-top: 0; }
.deepthink-analysis-content p { margin: 8px 0; }
.deepthink-analysis-content blockquote {
  border-left: 3px solid var(--accent);
  padding: 8px 12px;
  margin: 10px 0;
  background: rgba(124,108,240,0.06);
  border-radius: 0 8px 8px 0;
  color: var(--text);
}
.deepthink-analysis-content blockquote p { margin: 4px 0; }
.deepthink-analysis-content ul,
.deepthink-analysis-content ol {
  padding-left: 18px;
  margin: 6px 0;
}
.deepthink-analysis-content li { margin: 4px 0; }
.deepthink-analysis-content strong { color: var(--text); font-weight: 600; }
.deepthink-analysis-content em { color: var(--accent2); font-style: italic; }
.deepthink-analysis-content code {
  background: var(--card3);
  padding: 1px 5px;
  border-radius: 4px;
  font-size: 12px;
  color: var(--green);
}
.deepthink-analysis-content hr {
  border: none;
  border-top: 1px solid var(--border);
  margin: 16px 0;
}
.deepthink-analysis-error {
  padding: 16px;
  background: rgba(248,113,113,0.08);
  border: 1px solid rgba(248,113,113,0.2);
  border-radius: 8px;
  color: var(--red);
  font-size: 13px;
}
.deepthink-analyze-btn {
  margin-top: 16px;
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: linear-gradient(135deg, rgba(124,108,240,0.15), rgba(124,108,240,0.08));
  color: var(--accent2);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
}
.deepthink-analyze-btn:hover {
  border-color: var(--accent);
  background: linear-gradient(135deg, rgba(124,108,240,0.25), rgba(124,108,240,0.12));
}
.deepthink-analyze-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.deepthink-analysis-content .regenerate-btn {
  margin-top: 8px;
  padding: 6px 12px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--card2);
  color: var(--text3);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
}
.deepthink-analysis-content .regenerate-btn:hover { border-color: var(--accent); color: var(--text2); }

/* Middle: Chat */
.deepthink-middle {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
}
.deepthink-middle-header {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
.deepthink-middle-header h3 {
  font-size: 13px;
  font-weight: 700;
  color: var(--accent2);
  flex: 1;
}
.deepthink-context-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
.deepthink-context-label {
  font-size: 11px;
  color: var(--text3);
  white-space: nowrap;
}
.deepthink-context-track {
  width: 80px;
  height: 4px;
  background: var(--card3);
  border-radius: 2px;
  overflow: hidden;
}
.deepthink-context-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.3s ease, background 0.3s ease;
  background: var(--green);
}
.deepthink-context-fill.warning { background: var(--orange); }
.deepthink-context-fill.danger { background: var(--red); }
.deepthink-context-pct {
  font-size: 11px;
  color: var(--text3);
  min-width: 28px;
  text-align: right;
}
.deepthink-chat-body {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.deepthink-chat-body::-webkit-scrollbar { width: 4px; }
.deepthink-chat-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.deepthink-msg {
  display: flex;
  gap: 10px;
  animation: fadeInUp 0.25s ease;
}
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.deepthink-msg.user { flex-direction: row-reverse; }
.deepthink-msg-avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  flex-shrink: 0;
  font-weight: 700;
}
.deepthink-msg.user .deepthink-msg-avatar {
  background: linear-gradient(135deg, var(--accent), #7c3aed);
  color: #fff;
}
.deepthink-msg.assistant .deepthink-msg-avatar {
  background: linear-gradient(135deg, var(--green), #0d9488);
  color: #fff;
}
.deepthink-msg-bubble {
  max-width: 75%;
  padding: 12px 14px;
  border-radius: 14px;
  font-size: 13px;
  line-height: 1.7;
}
.deepthink-msg.user .deepthink-msg-bubble {
  background: linear-gradient(135deg, rgba(124,108,240,0.2), rgba(124,108,240,0.12));
  border: 1px solid rgba(124,108,240,0.3);
  color: var(--text);
  border-bottom-right-radius: 4px;
}
.deepthink-msg.assistant .deepthink-msg-bubble {
  background: var(--card2);
  border: 1px solid var(--border);
  color: var(--text2);
  border-bottom-left-radius: 4px;
}
.deepthink-msg-content { white-space: pre-wrap; word-break: break-word; }
.deepthink-msg-content p { margin: 4px 0; }
.deepthink-msg-content p:first-child { margin-top: 0; }
.deepthink-msg-content p:last-child { margin-bottom: 0; }
.deepthink-msg-content strong { color: var(--text); font-weight: 600; }
.deepthink-msg-content em { color: var(--accent2); font-style: italic; }
.deepthink-msg-content blockquote {
  border-left: 2px solid var(--accent);
  padding: 4px 10px;
  margin: 6px 0;
  background: rgba(124,108,240,0.06);
  border-radius: 0 6px 6px 0;
  color: var(--text2);
}
.deepthink-msg-content ul, .deepthink-msg-content ol { padding-left: 16px; margin: 4px 0; }
.deepthink-msg-content li { margin: 2px 0; }
.deepthink-msg-content code {
  background: var(--card3);
  padding: 1px 4px;
  border-radius: 3px;
  font-size: 12px;
  color: var(--green);
}
.deepthink-msg-content h1,
.deepthink-msg-content h2,
.deepthink-msg-content h3 {
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  margin: 8px 0 4px;
}
.deepthink-msg-content hr { border: none; border-top: 1px solid var(--border); margin: 8px 0; }
.deepthink-chat-empty {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  color: var(--text3);
  font-size: 13px;
  text-align: center;
  padding: 32px;
}
.deepthink-chat-empty-icon { font-size: 36px; opacity: 0.5; }
.deepthink-chat-welcome {
  padding: 12px 16px;
  background: rgba(124,108,240,0.06);
  border: 1px solid rgba(124,108,240,0.15);
  border-radius: 10px;
  font-size: 12px;
  color: var(--text3);
  line-height: 1.7;
  max-width: 75%;
}
.deepthink-chat-welcome strong { color: var(--text2); }
.deepthink-chat-input-area {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.deepthink-chat-input-row {
  display: flex;
  gap: 8px;
  align-items: flex-end;
}
.deepthink-chat-textarea {
  flex: 1;
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px 14px;
  color: var(--text);
  font-size: 13px;
  font-family: inherit;
  resize: none;
  outline: none;
  line-height: 1.6;
  min-height: 42px;
  max-height: 140px;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
  transition: border-color 0.2s;
}
.deepthink-chat-textarea:focus { border-color: var(--accent); }
.deepthink-chat-textarea::placeholder { color: var(--text3); }
.deepthink-chat-send {
  width: 38px;
  height: 38px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(135deg, var(--accent), #7c3aed);
  color: #fff;
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: opacity 0.2s, transform 0.15s;
  font-family: inherit;
}
.deepthink-chat-send:hover { opacity: 0.9; transform: scale(1.05); }
.deepthink-chat-send:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.deepthink-chat-loading {
  display: flex;
  gap: 10px;
  align-items: flex-start;
}
.deepthink-chat-loading-dots {
  display: flex;
  gap: 4px;
  padding: 14px;
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 14px;
  border-bottom-left-radius: 4px;
}
.deepthink-chat-loading-dots span {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--text3);
  animation: dotBounce 1.2s ease infinite;
}
.deepthink-chat-loading-dots span:nth-child(2) { animation-delay: 0.15s; }
.deepthink-chat-loading-dots span:nth-child(3) { animation-delay: 0.3s; }
@keyframes dotBounce {
  0%, 60%, 100% { transform: translateY(0); }
  30% { transform: translateY(-6px); }
}
.deepthink-context-warn {
  padding: 8px 14px;
  border-top: 1px solid var(--border);
  font-size: 11px;
  color: var(--orange);
  background: rgba(251,191,36,0.05);
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}

/* Right: Notes */
.deepthink-right {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
}
.deepthink-right-header {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.deepthink-right-header h3 {
  font-size: 13px;
  font-weight: 700;
  color: var(--accent2);
  display: flex;
  align-items: center;
  gap: 6px;
}
.deepthink-right-body {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.deepthink-right-body::-webkit-scrollbar { width: 4px; }
.deepthink-right-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.deepthink-notes-area {
  width: 100%;
  height: 100%;
  min-height: 300px;

  border: none;
  color: var(--text2);
  font-size: 13px;
  font-family: inherit;

  resize: none;
  outline: none;

}
.deepthink-notes-area::placeholder { color: var(--text3); }
.deepthink-notes-area:focus { outline: none; }
.deepthink-notes-toolbar {
  display: flex;
  gap: 4px;
  padding: 8px 4px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 8px;
}
.toolbar-btn {
  width: 30px;
  height: 28px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--card2);
  color: var(--text2);
  font-size: 13px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  font-family: inherit;
}
.toolbar-btn:hover {
  border-color: var(--accent);
  background: rgba(124,108,240,0.1);
  color: var(--accent2);
}
.toolbar-btn:active {
  transform: scale(0.95);
}
.deepthink-notes-rendered {
  width: 100%;
  height: 100%;
  font-size: 13px;
  line-height: 1.8;
  color: var(--text2);
  cursor: text;
  padding: 4px;
  white-space: pre-wrap;
  word-break: break-word;
  overflow-y: auto;
}
.deepthink-notes-rendered:hover {
  background: rgba(255,255,255,0.02);
  border-radius: 4px;
}

// Global loading state: tracks in-progress async operations per view
const loadingState = {
  analyze: { active: false, progress: 0, label: '', status: null },

  blindspots: { active: false, progress: 0, label: '', status: null },

};
// Simulate progress for a loading key
function simulateProgress(key, durationMs) {
  const state = loadingState[key];
  if (!state) return;
  state.active = true;
  state.progress = 0;
  state.status = 'running';
  const steps = [10, 25, 40, 55, 68, 78, 86, 92, 96, 99];
  const interval = durationMs / steps.length;
  let i = 0;
  const timer = setInterval(() => {
    if (!state.active) { clearInterval(timer); return; }
    if (i < steps.length) { state.progress = steps[i]; i++; }
    // Update sidebar queue
    updateQueueUI();
  }, interval);
  state._timer = timer;
  updateQueueUI();
}

function stopLoading(key) {
  const state = loadingState[key];
  if (!state) return;
  state.active = false;
  state.progress = 100;
  state.status = 'done';
  if (state._timer) clearInterval(state._timer);
  updateQueueUI();
  // Auto-remove from queue after 3s
  setTimeout(() => {
    if (state.status === 'done') { state.status = null; updateQueueUI(); }
  }, 3000);
}

function stopLoadingError(key, msg) {
  const state = loadingState[key];
  if (!state) return;
  state.active = false;
  state.status = 'error';
  state.errorMsg = msg || '失败';
  if (state._timer) clearInterval(state._timer);
  updateQueueUI();
  setTimeout(() => {
    if (state.status === 'error') { state.status = null; updateQueueUI(); }
  }, 5000);
}

function updateQueueUI() {
  const list = document.getElementById('queueList');
  const pulseEl = document.getElementById('queuePulse');
  if (!list) return;
  const items = Object.entries(loadingState).filter(([, s]) => s.status && s.status !== null);
  if (pulseEl) pulseEl.classList.toggle('active', items.some(([, s]) => s.status === 'running'));
  if (items.length === 0) {
    list.innerHTML = '<div style="font-size:10px;color:var(--text3);text-align:center;padding:8px 0">空闲</div>';
    return;
  }
  list.innerHTML = items.map(([key, s]) => {
    const dotClass = s.status === 'running' ? 'running' : s.status === 'error' ? 'error' : 'done';
    const fillClass = s.status === 'done' ? 'done' : s.status === 'error' ? 'error' : '';
    const pct = s.status === 'done' ? 100 : s.status === 'error' ? s.progress || 0 : s.progress;
    const label = s.status === 'done' ? '&#10003; 完成' : s.status === 'error' ? '&#10007; ' + (s.errorMsg || '失败') : s.label;
    return `<div class="queue-item">
      <div class="queue-item-label"><span class="dot ${dotClass}"></span>${label}</div>
      <div class="queue-progress"><div class="queue-progress-fill ${fillClass}" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');
}

function renderLoadingProgress(key) {

}

async function api(url, method = 'GET', body = null, timeoutMs = 600000) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutMs);
  const opts = { method, headers: { 'Content-Type': 'application/json' }, signal: controller.signal, credentials: 'same-origin' };
  if (body) opts.body = JSON.stringify(body);
  try {
    const res = await fetch(url, opts);
    if (res.status === 401) {
      currentUser = null;
      showLoginPage();
      throw new Error('登录已过期，请重新登录');
    }
    if (!res.ok) {
      const text = await res.text().catch(() => '');
      throw new Error(text || `HTTP ${res.status}`);
    }
    const data = await res.json();
    return data;
  } finally {
    clearTimeout(timer);
  }
}

function esc(str) {
  if (str == null) return '';
  const s = String(str);
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
}
// Escape for use inside single-quoted JS string literals in HTML attributes
function escJs(str) {
  if (str == null) return '';
  return String(str).replace(/\\/g, '\\\\').replace(/'/g, "\\'");
}
// Encode dim IDs for safe use in HTML attributes and CSS selectors
// Works in both data-* attributes and onclick handlers, decode with dec()
function enc(str) {
  if (str == null) return '';
  return encodeURIComponent(String(str));
}
function dec(str) {
  if (str == null) return '';
  try { return decodeURIComponent(String(str)); } catch { return str; }
}

function getStars(count) {

}

function getStarCount(dim) {

function getCategoryById(catId) {

function getBlindById(blindId) {

function buildCategoryAxes() {
  // Build dimIds for each category from dimensions' category field (reverse relation)
  // This handles data saved with only dimension.category without category.dimIds
  const dimIdsMap = {};
  const dims = mapData.dimensions || [];
  for (const dim of dims) {
    if (dim.category) {
      if (!dimIdsMap[dim.category]) dimIdsMap[dim.category] = [];
      dimIdsMap[dim.category].push(dim.id);
    }
  }

  const allCategories = (mapData.categories || []).filter(cat => {
    const ids = cat.dimIds || dimIdsMap[cat.id] || [];
    return ids.length > 0;
  });
  const blindspots = mapData.blindSpots || [];
  return allCategories.map(cat => {
    const catDimIds = new Set((cat.dimIds || dimIdsMap[cat.id] || []));
    const relatedBlinds = blindspots.filter(b => {
      const rDims = b.relatedDimensions || [];
      const rArr = typeof rDims === 'string' ? rDims.split(/\s+/) : rDims;
      return rArr.some(d => catDimIds.has(d));
    });
    return {
      id: cat.id,
      name: cat.name,
      description: cat.description,
      icon: cat.icon,
      dimIds: Array.from(catDimIds),
      blindIds: relatedBlinds.map(b => b.id)
    };
  });
}

// Get developing dimensions that have upgrade potential (have development paths)
function getUpgradePaths() {
  const paths = mapData?.developmentPaths || [];
  return paths.filter(p => {
    const dim = getDimById(p.targetDimension);
    // Path targets a developing dimension or a blind spot
    return dim?.status === 'developing' || p.targetDimension.startsWith('blind_');
  });
}

  // 动态更新修炼路径数量

            ${axis.blindIds.map(bid => { const b = getBlindById(bid); return b ? `<div class="dim-link" style="font-size:11px;padding:5px 8px;border-radius:8px;background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.2);cursor:pointer;" onclick="goToBlindspot('${enc(bid)}')">

      </div>`;

        </div>
      </div>
    </div>`;
  }

  // Upgrade paths (developing -> possessed potential)
  if (upgradePaths.length > 0) {
    html += `
    <div class="home-section">
      <h3>&#127919; 升级潜力</h3>
      <div class="home-upgrade">`;
    upgradePaths.forEach(p => {
      const isBlind = p.targetDimension.startsWith('blind_');
      const targetName = p.targetName;
      const outcome = p.expectedOutcome || '';

        <div class="upgrade-path" onclick="goToPath('${enc(p.id)}')">

  fetch('/api/growth-records', { credentials: 'same-origin' })

    .then(records => {
      if (records.length > 0) {
        const latest = records[records.length - 1];

        sec.className = 'home-section';

    }).catch(() => {});

  el.innerHTML = html;

  // Draw home radar chart
  const homeCanvas = document.getElementById('homeRadarCanvas');

  if (homeCanvas && homeRadarWrap && catAxesForDraw.length >= 3) {

// ============ ANALYZE VIEW ============
function renderAnalyze(el) {
  el.innerHTML = `
    <div class="analyze-layout">
      <div class="form-row">
        <div class="form-group">
          <label>说话人名称 <span style="font-size:11px;color:var(--text3)">（告诉模型"我"是哪个说话人）</span></label>
          <input class="form-input" id="speakerName" placeholder="如：说话人1">
        </div>
        <div class="form-group">
          <label>录音来源</label>
          <input class="form-input" id="sourceName" placeholder="如：部门规划讨论录音">
        </div>
      </div>
      <div class="form-group">
        <label>录音转写文件</label>
        <div class="file-upload-zone" id="dropZone">
          <div class="file-upload-placeholder" id="filePlaceholder">
            <div style="font-size:32px;opacity:0.4;margin-bottom:8px">&#128196;</div>
            <div>点击选择或拖拽 .txt 文件到此处</div>
            <div style="font-size:12px;color:var(--text3);margin-top:4px">支持任意长度的转写文本，不会截断</div>
          </div>
          <div class="file-upload-info" id="fileInfo" style="display:none">
            <span>&#128196;</span>
            <span id="fileName"></span>
            <span id="fileSize" style="color:var(--text3);font-size:12px"></span>
            <span class="file-remove" onclick="clearFile()" title="移除文件">&#10005;</span>
          </div>
          <input type="file" id="fileInput" accept=".txt,.text" style="display:none">
        </div>
      </div>
      <button class="btn primary" id="analyzeBtn" onclick="doAnalyze()">开始分析</button>
      <div id="analyzeResult"></div>
    </div>`;

  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');

  dropZone.onclick = () => fileInput.click();
  dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); };
  dropZone.ondragleave = () => dropZone.classList.remove('drag-over');
  dropZone.ondrop = (e) => { e.preventDefault(); dropZone.classList.remove('drag-over'); selectFile(e.dataTransfer.files[0]); };
  fileInput.onchange = () => { if (fileInput.files[0]) selectFile(fileInput.files[0]); };
}

let selectedFile = null;

function selectFile(file) {
  if (!file) return;
  selectedFile = file;
  document.getElementById('filePlaceholder').style.display = 'none';
  document.getElementById('fileInfo').style.display = 'flex';
  document.getElementById('fileName').textContent = file.name;
  const kb = (file.size / 1024).toFixed(1);
  const mb = (file.size / 1024 / 1024).toFixed(1);
  document.getElementById('fileSize').textContent = file.size > 1024 * 1024 ? ` (${mb} MB)` : ` (${kb} KB)`;
}

function clearFile() {
  selectedFile = null;
  document.getElementById('fileInput').value = '';
  document.getElementById('filePlaceholder').style.display = '';
  document.getElementById('fileInfo').style.display = 'none';
}

async function doAnalyze() {
  const btn = document.getElementById('analyzeBtn');
  const resultEl = document.getElementById('analyzeResult');
  const speakerName = document.getElementById('speakerName').value.trim();
  const sourceName = document.getElementById('sourceName').value.trim();

  if (!selectedFile || !speakerName) {
    toast('请选择录音转写文件并填写说话人名称', 'error');
    return;
  }

  btn.disabled = true;
  btn.textContent = '分析中...';
  loadingState.analyze = loadingState.analyze || { label: '', progress: 0, active: false, status: null };
  loadingState.analyze.label = '正在分析录音...';
  simulateProgress('analyze', 30000);
  resultEl.innerHTML = '<div class="loading"><div class="spinner"></div>AI 正在深度分析行为模式...</div>';

  try {
    // 使用 FormData 直接上传文件，不经过 textarea，不会截断
    const formData = new FormData();
    formData.append('file', selectedFile);
    formData.append('speakerName', speakerName);
    formData.append('sourceName', sourceName);
    formData.append('date', new Date().toISOString().split('T')[0]);

    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), 600000);
    const res = await fetch('/api/analyze', {
      method: 'POST',
      body: formData,
      signal: controller.signal,
      credentials: 'same-origin',
    });
    clearTimeout(timer);

    if (res.status === 401) {
      currentUser = null;
      showLoginPage();
      throw new Error('登录已过期，请重新登录');
    }
    if (!res.ok) {
      const text = await res.text().catch(() => '');
      throw new Error(text || `HTTP ${res.status}`);
    }

    const result = await res.json();
    mapData = result.map;
    stopLoading('analyze');
    toast('分析完成', 'success');

    // 级联更新：清除派生数据，下次访问时重新生成
    delete mapData.combinations;
    delete mapData.blindSpots;
    delete mapData.paths;
    updateSidebarCounts();
    if (currentView === 'home') renderHome();
    if (currentView === 'combos') renderCombos();
    if (currentView === 'blindspots') renderBlindspots();
    if (currentView === 'paths') renderPaths();

    const updates = result.updates;
    let html = `<div class="analyze-result"><h3>分析结果</h3><p>${esc(result.summary)}</p>`;

    if (updates.newDims && updates.newDims.length > 0) {
      html += `<div class="result-item"><strong>新增维度:</strong><br>`;
      updates.newDims.forEach(d => {
        html += `<span class="result-tag new">NEW</span><span class="result-tag ${d.status}">${d.status === 'possessed' ? '已具备' : '待发展'}</span>${esc(d.name)}<br>`;
      });
      html += '</div>';
    }

    if (updates.updatedDims && updates.updatedDims.length > 0) {
      html += `<div class="result-item"><strong>更新维度:</strong><br>`;
      updates.updatedDims.forEach(d => {
        html += `<span class="result-tag update">UPDATE</span>${esc(d.name)} (${esc(d.action)})<br>`;
      });
      html += '</div>';
    }

    if (updates.mergeSuggestions && updates.mergeSuggestions.length > 0) {
      html += `<div class="result-item"><strong>合并建议:</strong><br>`;
      updates.mergeSuggestions.forEach(m => {
        html += `${esc(m.suggestedName)}: ${esc(m.reason)}<br>`;
      });
      html += '</div>';
    }

    html += '</div>';
    resultEl.innerHTML = html;
    
    // 首次使用引导
    setTimeout(() => showFirstTimeGuide(result), 500);
  } catch (e) {
    toast(e.message, 'error');
    stopLoadingError('analyze', e.message);
    resultEl.innerHTML = `<div class="analyze-result"><h3>分析失败</h3><p>${esc(e.message)}</p></div>`;
  }

  btn.disabled = false;
  btn.textContent = '开始分析';
}

        <div style="display:flex;align-items:center;gap:10px">
          <span style="font-size:20px">&#9889;</span>
          <div>
            <div style="font-weight:600;margin-bottom:2px">核心组合</div>
            <div style="font-size:12px;color:var(--text3)">${combos.length} 个已识别的组合</div>
          </div>
        </div>
      </div>`;
  }
  
  // 建议查看能力图谱
  if (possessed.length > 0) {
    guideHtml += `
      <div style="background:var(--card2);border:1px solid rgba(45,212,191,0.2);border-radius:10px;padding:16px;margin-bottom:12px;cursor:pointer" onclick="switchView('map');closeGuide()">
        <div style="display:flex;align-items:center;gap:10px">
          <span style="font-size:20px">&#128506;</span>
          <div>
            <div style="font-weight:600;margin-bottom:2px">能力图谱</div>
            <div style="font-size:12px;color:var(--text3)">${possessed.length} 个已具备能力</div>
          </div>
        </div>
      </div>`;
  }
  
  // 建议查看修炼路径
  if (developing.length > 0) {
    guideHtml += `
      <div style="background:var(--card2);border:1px solid rgba(251,191,36,0.2);border-radius:10px;padding:16px;cursor:pointer" onclick="switchView('paths');closeGuide()">

          <button onclick="closeGuide()" style="padding:8px 20px;background:linear-gradient(135deg,var(--accent),#6366f1);color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:600">知道了</button>

function closeGuide() {
  const overlay = document.getElementById('firstGuideOverlay');

// ============ 里程碑追踪 ============
let milestonesCache = null;

async function loadMilestones() {
  // 每次加载前清空缓存，确保切换用户后正确加载对应数据
  milestonesCache = null;
  
  // 先尝试从服务器加载（优先）
  try {
    const res = await fetch('/api/milestones');
    if (res.ok) {
      const data = await res.json();
      milestonesCache = Array.isArray(data) ? data : [];
      return milestonesCache;
    }
  } catch (e) {
    console.error('加载里程碑失败:', e);
  }
  
  // 如果服务器没有，返回空
  milestonesCache = [];
  return milestonesCache;
}

  // Developing column

  html += renderCategoryPanels(developingByCat, 'developing', true);
  html += '</div>';

  html += '</div>';

  if ((mapData?.dimensions || []).length === 0) {
    html = deleteBarHtml + `<div class="empty-state"><div class="icon">&#128506;</div><h3>还没有能力维度</h3><p>去"分析录音"页面提交录音文本，开始构建你的能力图谱</p></div>`;
  }

  el.innerHTML = html;
  deleteQueue = [];
  // 如果是首页点击跳转，展开后清除标记
  if (expandPossessedOnMap) {
    expandPossessedOnMap = false;
  }
  // 如果是成长轨迹点击维度，跳转到对应维度并高亮
  if (selectedDimId) {
    setTimeout(() => {
      const target = document.querySelector('[data-dim-id="' + selectedDimId + '"]');
      if (target) {
        target.scrollIntoView({ behavior: 'smooth', block: 'center' });
        target.style.boxShadow = '0 0 0 2px var(--accent2), 0 0 20px rgba(124,108,240,0.3)';
        setTimeout(() => { target.style.boxShadow = ''; }, 2500);
      }
      selectedDimId = null;
    }, 50);
  }
}

function navigateToDim(dimId) {
  selectedDimId = dimId;

  switchView('map');
}

function navigateToMapExpandPossessed() {
  expandPossessedOnMap = true;
