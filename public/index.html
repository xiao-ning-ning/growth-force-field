function renderDeepthinkAnalysisContent(body, content) {
  // Use marked.js for full markdown rendering
  let html;
  if (typeof marked !== 'undefined') {
    html = marked.parse(content);
  } else {
    // Fallback: basic conversion
    html = content
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/\n\n/g, '</p><p>')
      .replace(/\n/g, '<br>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/^>(.+)$/gm, '<blockquote>$1</blockquote>')
      .replace(/^(#{1,3})\s+(.+)$/gm, (_, hashes, text) => {
        const level = hashes.length;
        return `<h${level + 3}>${text}</h${level + 3}>`;
      })
      .replace(/^- (.+)$/gm, '<li>$1</li>')
      .replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>');
  }

  body.innerHTML = `
    <div class="deepthink-analysis-content" id="deepthinkAnalysisContent">
      ${html}
    </div>`;
}

async function runDeepthinkAnalysis() {
  const btn = document.getElementById('deepthinkAnalyzeBtn');
  const regenBtn = document.getElementById('deepthinkRegenBtn');
  if (btn) { btn.disabled = true; btn.textContent = '审计中...'; }
  if (regenBtn) regenBtn.style.display = 'none';

  deepthinkAnalysis = { loading: true, content: null, error: null };
  loadingState.deepthink.label = '深度审计中...';
  simulateProgress('deepthink', 40000);

  try {
    const result = await api('/api/deepthink/analyze', 'POST');
    deepthinkAnalysis = { loading: false, content: result.analysis, error: null };
    await api('/api/deepthink/analysis', 'POST', { analysis: result.analysis });
    deepthinkData.analysis = result.analysis;
    stopLoading('deepthink');
    const regenBtnAfter = document.getElementById('deepthinkRegenBtn');
    if (regenBtnAfter) regenBtnAfter.style.display = '';
    const body = document.getElementById('deepthinkLeftBody');
    if (body) renderDeepthinkAnalysisContent(body, deepthinkAnalysis.content);

    // 重新审计时清空对话，但保留沉思录
    deepthinkChat.messages = [];
    deepthinkChat.contextPct = 0;
    deepthinkChat.warnShown = false;
    deepthinkData.messages = [];
    // 持久化清空后的 messages（不传 notes，保持不变）
    await api('/api/deepthink/messages', 'POST', { messages: [] }).catch(() => {});
    renderDeepthinkChat();
  } catch (e) {
    deepthinkAnalysis = { loading: false, content: null, error: e.message };
    stopLoadingError('deepthink', e.message);
    const body = document.getElementById('deepthinkLeftBody');
    if (body) {
      body.innerHTML = `
        <div class="deepthink-analysis-error">审计失败：${esc(e.message)}</div>
        <button class="deepthink-analyze-btn" onclick="runDeepthinkAnalysis()">重试</button>`;
    }
  }
}

function renderDeepthinkChat() {
  const body = document.getElementById('deepthinkChatBody');
  if (!body) return;

  if (deepthinkChat.messages.length === 0) {
    body.innerHTML = `
      <div class="deepthink-chat-empty">
        <div class="deepthink-chat-empty-icon">&#129504;</div>
        <div>基于左侧的审计结果，开启有判断力的对话</div>
      </div>
      <div class="deepthink-chat-welcome">
        <strong>提示：</strong>这个对话模块拥有独立的专业判断力，不会敷衍你。问任何关于你能力发展的真实问题。
      </div>`;
  } else {
    body.innerHTML = deepthinkChat.messages.map(m => {
      let msgHtml;
      if (typeof marked !== 'undefined') {
        // AI messages render markdown, user messages render plain
        msgHtml = m.role === 'assistant'
          ? marked.parse(m.content)
          : esc(m.content).replace(/\n/g, '<br>');
      } else {
        msgHtml = esc(m.content).replace(/\n/g, '<br>');
      }
      return `
        <div class="deepthink-msg ${m.role}">
          <div class="deepthink-msg-avatar">${m.role === 'user' ? '你' : 'AI'}</div>
          <div class="deepthink-msg-bubble">
            <div class="deepthink-msg-content">${msgHtml}</div>
          </div>
        </div>`;
    }).join('');
  }

  // Update context bar
  updateDeepthinkContextBar();

  // Scroll to bottom
  setTimeout(() => { body.scrollTop = body.scrollHeight; }, 50);
}

function updateDeepthinkContextBar() {
  // Estimate token count (roughly 1 token ~ 2 chars for Chinese)
  const totalChars = deepthinkChat.messages.reduce((sum, m) => sum + m.content.length, 0);
  const estimatedTokens = Math.ceil(totalChars / 2);
  const pct = Math.min(100, Math.round((estimatedTokens / MAX_CONTEXT) * 100));

  const fill = document.getElementById('deepthinkContextFill');
  const pctEl = document.getElementById('deepthinkContextPct');
  const warn = document.getElementById('deepthinkContextWarn');

  if (fill) {
    fill.style.width = pct + '%';
    fill.className = 'deepthink-context-fill' + (pct >= 90 ? ' danger' : pct >= 70 ? ' warning' : '');
  }
  if (pctEl) pctEl.textContent = pct + '%';

  if (warn) {
    if (pct >= 90 && !deepthinkChat.warnShown) {
      warn.style.display = 'flex';
      deepthinkChat.warnShown = true;
    } else if (pct < 70) {
      warn.style.display = 'none';
      deepthinkChat.warnShown = false;
    }
  }

  deepthinkChat.contextPct = pct;
}

async function deepthinkSend() {
  const textarea = document.getElementById('deepthinkInput');
  const sendBtn = document.getElementById('deepthinkSendBtn');
  const body = document.getElementById('deepthinkChatBody');
  if (!textarea || !sendBtn || !body) return;

  const content = textarea.value.trim();
  if (!content) return;

  textarea.value = '';
  textarea.style.height = 'auto';

  // Add user message
  deepthinkChat.messages.push({ role: 'user', content });

  // Show loading
  const loadingHtml = `
    <div class="deepthink-chat-loading" id="deepthinkLoadingMsg">
      <div class="deepthink-msg-avatar">AI</div>
      <div class="deepthink-chat-loading-dots">
        <span></span><span></span><span></span>
      </div>
    </div>`;

  // Remove empty state
  const emptyEl = body.querySelector('.deepthink-chat-empty');
  const welcomeEl = body.querySelector('.deepthink-chat-welcome');
  if (emptyEl) emptyEl.remove();
  if (welcomeEl) welcomeEl.remove();

  body.insertAdjacentHTML('beforeend', loadingHtml);
  body.scrollTop = body.scrollHeight;
  sendBtn.disabled = true;

  try {
    // Only send analysis as context on the first message
    let contextSummary = '';
    if (deepthinkChat.messages.length === 1 && deepthinkAnalysis.content) {
      contextSummary = '【深度分析审计结果】\n' + deepthinkAnalysis.content;
    }

    const result = await api('/api/deepthink/chat', 'POST', {
      messages: deepthinkChat.messages,
      contextSummary
    });

    // Remove loading
    const loading = document.getElementById('deepthinkLoadingMsg');
    if (loading) loading.remove();

    // Add assistant message
    deepthinkChat.messages.push({ role: 'assistant', content: result.reply });

    // Persist messages
    deepthinkData.messages = deepthinkChat.messages;
    await api('/api/deepthink/messages', 'POST', { messages: deepthinkChat.messages }).catch(() => {});

    // Auto-compress if needed
    if (deepthinkChat.contextPct >= 90) {
      await compressDeepthinkContext();
    }

    renderDeepthinkChat();
  } catch (e) {
    const loading = document.getElementById('deepthinkLoadingMsg');
    if (loading) loading.remove();

    toast('发送失败：' + e.message, 'error');
    renderDeepthinkChat();
  } finally {
    sendBtn.disabled = false;
  }
}

async function compressDeepthinkContext() {
  if (deepthinkChat.messages.length <= 4) return;

  toast('上下文过长，正在压缩历史对话...', 'info');

  // Keep first message pair (system context) + last N pairs
  const keepCount = 2;
  const first = deepthinkChat.messages.slice(0, 2);
  const last = deepthinkChat.messages.slice(-keepCount * 2);

  // Add compression note
  const compressionNote = {
    role: 'system',
    content: `【上下文压缩】以下对话已被压缩以节省上下文空间。`
  };

  deepthinkChat.messages = [...first, compressionNote, ...last];
  deepthinkChat.warnShown = false;
  deepthinkData.messages = deepthinkChat.messages;
  await api('/api/deepthink/messages', 'POST', { messages: deepthinkChat.messages }).catch(() => {});

  toast('上下文已压缩，对话继续', 'success');
}

function deepthinkNotesEnterEdit() {

function deepthinkNotesExitEdit() {
  const textarea = document.getElementById('deepthinkNotes');
  const renderEl = document.getElementById('deepthinkNotesRender');
  const toolbarEl = document.getElementById('deepthinkNotesToolbar');
  if (!textarea || !renderEl) return;

  // Save current content
  deepthinkData.notes = textarea.value;

  // Render markdown
  const content = textarea.value;
  if (content.trim()) {
    if (typeof marked !== 'undefined') {
      renderEl.innerHTML = marked.parse(content);
    } else {
      renderEl.innerHTML = content
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
        .replace(/^- (.+)$/gm, '<li>$1</li>')
        .replace(/(<li>.+<\/li>)/gs, '<ul>$1</ul>')
        .replace(/\n/g, '<br>');
    }
  } else {
    renderEl.innerHTML = '<div class="notes-placeholder">点击编辑沉思录...</div>';
  }

  textarea.style.display = 'none';
  renderEl.style.display = 'block';
  if (toolbarEl) toolbarEl.style.display = 'none';
}

function deepthinkInsertMarkdown(type) {
  const textarea = document.getElementById('deepthinkNotes');
  if (!textarea) return;
  
  const start = textarea.selectionStart;
  const end = textarea.selectionEnd;
  const text = textarea.value;
  const selected = text.substring(start, end);
  
  let insert = '';
  let cursorOffset = 0;
  
  switch (type) {
    case 'bold':
      if (selected) {
        insert = `**${selected}**`;
        cursorOffset = insert.length;
      } else {
        insert = '****';
        cursorOffset = 2;
      }
      break;
    case 'italic':
      if (selected) {
        insert = `*${selected}*`;
        cursorOffset = insert.length;
      } else {
        insert = '**';
        cursorOffset = 1;
      }
      break;
    case 'ul':
      const ulLines = selected ? selected.split('\n') : [''];
      insert = ulLines.map(line => '- ' + line).join('\n');
      cursorOffset = insert.length;
      break;
    case 'ol':
      const olLines = selected ? selected.split('\n') : [''];
      insert = olLines.map((line, i) => `${i + 1}. ${line}`).join('\n');
      cursorOffset = insert.length;
      break;
  }
  
  textarea.value = text.substring(0, start) + insert + text.substring(end);
  textarea.focus();
  const newPos = start + cursorOffset;
  textarea.setSelectionRange(newPos, newPos);
  deepthinkOnNotesInput();
}

function showLoginPage() {
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="login-page">
      <div class="login-box">
        <div class="login-brand">
          <div class="login-icon">&#127793;</div>
          <h1>成长透镜</h1>
          <p>GrowthLens</p>
        </div>
        <form id="loginForm" class="login-form">
          <div class="login-field">
            <label>用户名</label>
            <input type="text" id="loginUser" autocomplete="off" placeholder="请输入用户名" required>
          </div>
          <div class="login-field">
            <label>密码</label>
            <input type="password" id="loginPass" autocomplete="off" placeholder="请输入密码" required>
          </div>
          <div id="loginError" class="login-error" style="display:none"></div>
          <button type="submit" id="loginBtn">登 录</button>
        </form>
        <p class="login-hint">首次使用请登录管理员账号 (admin / admin123456)</p>
      </div>
    </div>`;
  document.getElementById('loginForm').addEventListener('submit', handleLogin);
  document.getElementById('loginUser').focus();
}

async function handleLogin(e) {
  e.preventDefault();
  const username = document.getElementById('loginUser').value.trim();
  const password = document.getElementById('loginPass').value;
  const errEl = document.getElementById('loginError');
  const btn = document.getElementById('loginBtn');
  if (!username || !password) { errEl.textContent = '请输入用户名和密码'; errEl.style.display = 'block'; return; }
  btn.disabled = true; btn.textContent = '登录中...'; errEl.style.display = 'none';
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'same-origin',
      body: JSON.stringify({ username, password }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || '登录失败');
    currentUser = data.user;
    localStorage.setItem('gff_credentials', JSON.stringify({ username, password }));
    initApp();
  } catch (e) {
    errEl.textContent = e.message; errEl.style.display = 'block';
    btn.disabled = false; btn.textContent = '登 录';
  }
}

async function handleLogout() {
  try { await api('/api/auth/logout', 'POST'); } catch(e) {}
  localStorage.removeItem('gff_credentials');
  currentUser = null;
  showLoginPage();
}

function initApp() {
  document.getElementById('app').innerHTML = mainAppHTML;
  bindNavigation();
  // Show admin nav-item only for admin users
  const adminNav = document.querySelector('.nav-admin-only');
  if (adminNav && currentUser?.role === 'admin') adminNav.style.display = '';
  // Sync version from package.json via API
  fetch('/api/version').then(r => r.json()).then(s => {
    const vEl = document.getElementById('sidebarVersion');
    if (vEl && s.version) vEl.textContent = 'v' + s.version.replace(/^(\d+\.\d+).*/, '$1') + ' · 本地运行';
  }).catch(() => {});
  // Add logout button
  const footer = document.querySelector('.sidebar-footer');
  if (footer) {
    const logoutBtn = document.createElement('button');
    logoutBtn.className = 'sidebar-logout';
    logoutBtn.textContent = '退出登录 (' + currentUser.username + ')';
    logoutBtn.onclick = handleLogout;
    footer.parentNode.insertBefore(logoutBtn, footer);
  }
  loadMap().then(() => renderView('home'));
}

// ============ INIT ============
async function tryAutoLogin() {
  // 1. 先检查 session 是否有效
  try {
    const r = await fetch('/api/auth/me', { credentials: 'same-origin' });
    if (r.ok) {
      const data = await r.json();
      currentUser = data.user;
      initApp();
      return;
    }
  } catch (e) {}

  // 2. session 无效，尝试 localStorage 自动登录
  const saved = localStorage.getItem('gff_credentials');
  if (saved) {
    try {
      const { username, password } = JSON.parse(saved);
      const r = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'same-origin',
        body: JSON.stringify({ username, password }),
      });
      if (r.ok) {
        const data = await r.json();
        currentUser = data.user;
        initApp();
        return;
      }
    } catch (e) {}
  }

  // 3. 都不行，显示登录页
  showLoginPage();
}
tryAutoLogin();
