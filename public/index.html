}

function groupByCategory(dims) {
  const groups = {};
  dims.forEach(d => {
    const catId = d.category || 'uncategorized';
    if (!groups[catId]) groups[catId] = [];
    groups[catId].push(d);
  });
  return groups;
}

function renderCategoryPanels(byCat, type, forceOpen) {
  let html = '';
  // Use category order from mapData to maintain consistent ordering
  const catOrder = (mapData?.categories || []).map(c => c.id);
  const allCatIds = [...new Set([...catOrder, ...Object.keys(byCat)])];

  for (const catId of allCatIds) {
    if (!byCat[catId]) continue;
    const dims = byCat[catId];
    const catDesc = getCategoryDesc(catId);

    html += `<div class="category-panel">
      <div class="category-header${forceOpen ? ' open' : ''}" onclick="toggleCategory(this)">
        <span class="arrow">&#9654;</span>
        <span class="cat-icon">${getCategoryIcon(catId)}</span>
        <span>${getCategoryName(catId)}</span>
        ${catDesc ? `<span class="cat-desc">${catDesc}</span>` : ''}
        <span style="margin-left:auto;font-size:11px;color:var(--text3)">${dims.length}</span>
      </div>
      <div class="category-body${forceOpen ? ' open' : ''}">`;

    dims.forEach(d => {
      const hasUpgradePath = (mapData?.developmentPaths || []).some(p => p.targetDimension === d.id);
      html += `<div class="dim-card ${d.status}" data-dim-id="${enc(d.id)}" onclick="showDimDetail('${enc(d.id)}')">
        <div class="dim-card-head">
          <span class="dim-card-name">${esc(d.name)}</span>
          <span class="dim-stars">${getStars(getStarCount(d))}</span>
          ${d.status === 'developing' && hasUpgradePath ? '<span class="dim-upgrade-badge">&#127919; 可升级</span>' : ''}
        </div>
        <div class="dim-card-desc">${esc(d.description)}</div>
        <button class="dim-card-delete" onclick="event.stopPropagation();queueDelete('${enc(d.id)}','${esc(d.name)}')">&times;</button>
      </div>`;
    });
    html += '</div></div>';
  }
  return html;
}

function toggleCategory(el) {
  el.classList.toggle('open');
  const body = el.nextElementSibling;
  body.classList.toggle('open');
}

function showDimDetail(dimId) {
  dimId = dec(dimId);
  const d = getDimById(dimId);
  console.log('[showDimDetail] raw:', arguments[0], 'decoded:', dimId, 'found:', !!d, 'status:', d?.status);
  if (!d) return;

  const hasUpgradePath = (mapData?.developmentPaths || []).some(p => p.targetDimension === d.id);
  const upgradePath = (mapData?.developmentPaths || []).find(p => p.targetDimension === d.id);

  let html = `<h3>${esc(d.name)}</h3>
    <span class="modal-status ${d.status}">${d.status === 'possessed' ? '已具备' : '待发展'}</span>
    <span class="dim-stars" style="font-size:14px">${getStars(getStarCount(d))}</span>
    <span style="font-size:11px;color:var(--text3);margin-left:4px">星 · ${d.evidence?.length || 0} 条证据</span>
    <div class="modal-desc">${esc(d.description)}</div>`;

  // Upgrade path for developing dimensions
  if (d.status === 'developing' && upgradePath) {
    html += `<div class="modal-upgrade">
      <h4>&#127919; 升级路径 <button class="btn" style="font-size:11px;padding:3px 10px;margin-left:8px;background:var(--orange);color:#000;border:none;border-radius:8px;cursor:pointer;font-weight:600" onclick="closeModal();goToPath('${enc(upgradePath.id)}')">查看修炼路径 &#10132;</button></h4>
      <p><strong>当前缺口：</strong>${esc(upgradePath.currentGap)}</p>
      <p style="margin-top:6px"><strong>预期变化：</strong>${esc(upgradePath.expectedOutcome)}</p>
      ${(() => { const validLevs = (upgradePath.leveragedFrom || []).filter(id => getDimById(id)); return validLevs.length > 0 ? `<p style="margin-top:6px"><strong>杠杆维度：</strong>${validLevs.map(id => `<span class="dim-link" style="font-size:12px;padding:2px 8px;border-radius:8px;background:var(--card2);border:1px solid var(--border);cursor:pointer;display:inline-block;margin:2px" onclick="showDimDetail('${enc(id)}')">${esc(getDimName(id))}</span>`).join(' ')}</p>` : ''; })()}
    </div>`;
  }

  if (Array.isArray(d.relatedTo) && d.relatedTo.length > 0) {
    html += `<div class="modal-section"><h4>关联维度</h4><div class="related-tags">`;
    d.relatedTo.forEach(rid => {
      html += `<span class="related-tag" onclick="closeModal();setTimeout(()=>showDimDetail('${enc(rid)}'),100)">${esc(getDimName(rid))}</span>`;
    });
    html += '</div></div>';
  }

  html += `<div class="modal-section"><h4>行为证据 (${d.evidence?.length || 0})</h4>`;
  (d.evidence || []).forEach((ev, idx) => {
    const polarity = ev.polarity;
    const polarityBadge = polarity === -1
      ? '<span class="evidence-polarity negative" title="负面证据">&#10060; 负面</span>'
      : '<span class="evidence-polarity positive" title="正面证据">&#9733; 正面</span>';
    html += `<div class="evidence-item ${d.status}">
      ${ev.rawQuote ? `<div class="evidence-raw">${esc(ev.rawQuote)}</div>` : ''}
      <div class="evidence-quote" id="ev-quote-${enc(dimId)}-${idx}">${polarityBadge}${esc(ev.quote)}</div>
      <div class="evidence-actions">
        <button class="btn" style="font-size:10px;padding:2px 8px" onclick="editEvidence('${enc(dimId)}',${idx})">编辑</button>
        ${ev.corrected ? `<button class="btn" style="font-size:10px;padding:2px 8px" onclick="revertEvidence('${enc(dimId)}',${idx})">还原</button>` : ''}
      </div>
      <div class="evidence-meta">${esc(ev.source)} &middot; ${esc(ev.speaker)} &middot; ${esc(ev.date)}</div>
      ${ev.interpretation ? `<div class="evidence-interpretation">${esc(ev.interpretation)}</div>` : ''}
      ${ev.corrected ? '<div class="evidence-corrected">&#10003; 已编辑</div>' : ''}
    </div>`;
  });
  html += '</div>';

  openModal(html);
}

// ---- Evidence inline editing ----
function editEvidence(dimId, evIdx) {
  const d = getDimById(dimId);
  if (!d || !d.evidence[evIdx]) return;
  const ev = d.evidence[evIdx];
  const quoteEl = document.getElementById(`ev-quote-${dimId}-${evIdx}`);
  if (!quoteEl) return;

  // Replace text with textarea
  const textarea = document.createElement('textarea');
  textarea.value = ev.quote;
  textarea.className = 'evidence-edit-textarea';
  textarea.rows = 3;
  quoteEl.replaceWith(textarea);
  textarea.focus();

  // Replace edit button with save/cancel
  const actionsEl = textarea.parentElement.querySelector('.evidence-actions');
  if (!actionsEl) return;
  const origHtml = actionsEl.innerHTML;
  actionsEl.innerHTML = `
    <button class="btn primary" style="font-size:10px;padding:2px 8px" onclick="saveEvidence('${enc(dimId)}',${evIdx},this)">保存</button>
    <button class="btn" style="font-size:10px;padding:2px 8px" onclick="cancelEditEvidence('${enc(dimId)}',${evIdx},this)">取消</button>
  `;
  actionsEl.dataset.origHtml = origHtml;
}

async function saveEvidence(dimId, evIdx, btnEl) {
  dimId = dec(dimId);
  const textarea = btnEl.closest('.evidence-item').querySelector('.evidence-edit-textarea');
  if (!textarea) return;
  const newQuote = textarea.value.trim();
  if (!newQuote) { toast('引用文本不能为空', 'error'); return; }

  try {
    await api('/api/evidence/edit', 'POST', {
      dimensionId: dimId,
      evidenceIndex: evIdx,
      quote: newQuote
    });
    // Update local data
    const d = getDimById(dimId);
    if (d && d.evidence[evIdx]) {
      if (!d.evidence[evIdx].rawQuote) d.evidence[evIdx].rawQuote = d.evidence[evIdx].quote;
      d.evidence[evIdx].quote = newQuote;
      d.evidence[evIdx].corrected = true;
    }
    toast('已保存', 'success');
    // Re-render the detail modal
    showDimDetail(dimId);
  } catch (e) {
    toast(e.message, 'error');
  }
}

function cancelEditEvidence(dimId, evIdx, btnEl) {
  dimId = dec(dimId);
  // Just re-render the detail modal
  showDimDetail(dimId);
}

async function revertEvidence(dimId, evIdx) {
  dimId = dec(dimId);
  try {
    await api('/api/correct/revert', 'POST', {
      dimensionId: dimId,
      evidenceIndex: evIdx
    });
    // Update local data
    const d = getDimById(dimId);
    if (d && d.evidence[evIdx] && d.evidence[evIdx].rawQuote) {
      d.evidence[evIdx].quote = d.evidence[evIdx].rawQuote;
      delete d.evidence[evIdx].rawQuote;
      d.evidence[evIdx].corrected = false;
    }
    toast('已还原', 'success');
    showDimDetail(dimId);
  } catch (e) {
    toast(e.message, 'error');
  }
}

function queueDelete(dimId, dimName) {
  dimId = dec(dimId);
  if (deleteQueue.includes(dimId)) return;
  deleteQueue.push(dimId);
  // 给卡片加视觉区分
  document.querySelectorAll('.dim-card').forEach(card => {
    const id = dec(card.dataset.dimId);
    card.classList.toggle('dim-selected', deleteQueue.includes(id));
  });
  updateDeleteBar();
}

function removeFromDelete(dimId) {
  dimId = dec(dimId);
  deleteQueue = deleteQueue.filter(id => id !== dimId);
  // 移除卡片视觉区分
  document.querySelectorAll('.dim-card').forEach(card => {
    const id = dec(card.dataset.dimId);
    card.classList.toggle('dim-selected', deleteQueue.includes(id));
  });
  updateDeleteBar();
}

function updateDeleteBar() {
  const bar = document.getElementById('deleteBar');
  const label = document.getElementById('deleteLabel');
  const tags = document.getElementById('deleteTags');
  if (!bar) return;

  bar.classList.toggle('visible', deleteQueue.length > 0);
  label.textContent = `待删除: ${deleteQueue.length} 个维度`;
  tags.innerHTML = deleteQueue.map(id =>
    `<span class="delete-tag">${esc(getDimName(id))}<span class="x" onclick="removeFromDelete('${id}')">&times;</span></span>`
  ).join('');
}

async function applyDelete() {
  if (deleteQueue.length === 0) return;
  try {
    const result = await api('/api/dimensions/delete', 'POST', { dimensionIds: deleteQueue });
    mapData = result.map;
    deleteQueue = [];
    toast('删除成功', 'success');
    renderView('map');
  } catch (e) {
    toast(e.message, 'error');
  }
}

      html += `<div class="blind-evidence-card"><b>场景:</b> ${esc(ev.context)}<br><b>缺口:</b> ${esc(ev.gap)}</div>`;
    });

    if (b.relatedDimensions && b.relatedDimensions.length > 0) {

function toggleBlindDelete(blindId, event) {
  event.stopPropagation();
  blindId = dec(blindId);
  const idx = blindDeleteQueue.indexOf(blindId);
  if (idx === -1) {
    blindDeleteQueue.push(blindId);
  } else {
    blindDeleteQueue.splice(idx, 1);

  const bar = document.getElementById('blindDeleteBar');
  if (bar) {
    if (blindDeleteQueue.length === 0) {
      bar.style.display = 'none';
    } else {
      bar.style.display = 'flex';

  // Update card styles
  document.querySelectorAll('.blind-card').forEach(card => {
    const id = card.dataset.blindId;
    card.classList.toggle('dim-selected', blindDeleteQueue.includes(id));
  });
}

// ============ PATHS VIEW ============
function renderPaths(el) {
  const pathsLoading = renderLoadingProgress('paths');
  if (pathsLoading) { el.innerHTML = pathsLoading; return; }
  const paths = mapData?.developmentPaths || [];
  if (paths.length === 0) {
    el.innerHTML = `<div class="empty-state"><div class="icon">&#127793;</div><h3>还没有修炼路径</h3><p>有待发展维度或盲区后，点击"刷新修炼路径"生成</p><button class="btn primary" style="margin-top:16px" onclick="genPaths()">刷新修炼路径</button></div>`;
    return;
  }
  
  // 获取本地存储的完成状态
  const completedSteps = JSON.parse(localStorage.getItem('gff_completed_steps') || '{}');
  const completedPaths = JSON.parse(localStorage.getItem('gff_completed_paths') || '[]');

  let html = '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px"><h3 style="margin:0">修炼路径</h3><button class="btn primary" style="font-size:11px;padding:4px 12px" onclick="genPaths()">刷新修炼路径</button></div><div class="paths-list">';
  paths.forEach(p => {
    const isBlind = p.targetDimension && p.targetDimension.startsWith('blind_');
    const leveragedFrom = (Array.isArray(p.leveragedFrom) ? p.leveragedFrom : (typeof p.leveragedFrom === 'string' ? p.leveragedFrom.split(' ').filter(Boolean) : [])).filter(id => getDimById(id));
    const steps = Array.isArray(p.steps) ? p.steps : [];
    const isPathCompleted = completedPaths.includes(p.id);
    const pathCompletedSteps = steps.filter((s, i) => completedSteps[`${p.id}_${i}`]).length;
    const allStepsCompleted = steps.length > 0 && pathCompletedSteps === steps.length;

    html += `<div class="path-card ${isPathCompleted ? 'completed' : ''}" id="path-${p.id}" style="${isPathCompleted ? 'opacity:0.7;border-color:var(--green)' : ''}">
      <div class="path-header">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <h3 style="margin:0">${isBlind ? '&#128065; ' : '&#127793; '}${esc(p.targetName)}</h3>
          ${isPathCompleted ? '<span style="font-size:11px;padding:2px 8px;background:rgba(45,212,191,0.15);color:var(--green);border-radius:10px">&#10003; 已完成</span>' : ''}
          ${allStepsCompleted && !isPathCompleted ? `<button onclick="completePath('${enc(p.id)}')" style="font-size:11px;padding:2px 8px;background:var(--green);color:#000;border:none;border-radius:10px;cursor:pointer;font-weight:600">标记完成</button>` : ''}
        </div>
        <div class="path-gap">${esc(p.currentGap)}</div>
        ${leveragedFrom.length > 0 ? `<div class="path-leverages">杠杆: ${leveragedFrom.map(id =>
          `<span class="path-leverage-tag" style="cursor:pointer" onclick="showDimDetail('${enc(id)}')">${esc(getDimName(id))}</span>`
        ).join('')}</div>` : ''}
      </div>`;

    // Steps with full detail and checkboxes
    if (steps.length > 0) {
      html += '<div class="path-steps">';
      steps.forEach((s, i) => {
        const isChecked = completedSteps[`${p.id}_${i}`];
        html += `<div class="path-step ${isChecked ? 'step-checked' : ''}" style="${isChecked ? 'opacity:0.6' : ''}">
          <div class="path-step-num" style="${isChecked ? 'background:var(--green)' : ''}">
            ${isChecked ? '&#10003;' : (i + 1)}
          </div>
          <div class="path-step-content">
            <label style="display:flex;align-items:flex-start;gap:8px;cursor:pointer">
              <input type="checkbox" ${isChecked ? 'checked' : ''} onchange="toggleStep('${p.id}', ${i}, this.checked)" style="width:16px;height:16px;margin-top:3px;cursor:pointer;accent-color:var(--green)">
              <div>
                <h4 style="${isChecked ? 'text-decoration:line-through;color:var(--text3)' : ''}">${esc(s.action)}</h4>
                ${s.detail ? `<div class="detail" style="${isChecked ? 'color:var(--text3)' : ''}">${esc(s.detail)}</div>` : ''}
                ${s.leverage ? `<span class="leverage">&#127793; ${esc(s.leverage)}</span>` : ''}
              </div>
            </label>
          </div>
        </div>`;
      });
      html += '</div>';
      if (steps.length > 0) {
        html += `<div style="font-size:12px;color:var(--text3);margin-top:8px">${pathCompletedSteps}/${steps.length} 步骤已完成</div>`;
      }
    }

    if (p.expectedOutcome) {
      html += `<div class="path-outcome"><strong>预期变化:</strong> ${esc(p.expectedOutcome)}</div>`;
    }

    html += '</div>';
  });
  html += '</div>';
  el.innerHTML = html;
  if (selectedPathId) {
    const target = document.getElementById('path-' + selectedPathId);
    if (target) {
      target.scrollIntoView({ behavior: 'smooth', block: 'center' });
      target.style.boxShadow = '0 0 0 2px var(--orange), 0 0 20px rgba(253,203,110,0.3)';
      setTimeout(() => { target.style.boxShadow = ''; }, 2000);
    }
    selectedPathId = null;
  }
}

function toggleStep(pathId, stepIndex, checked) {
  const completedSteps = JSON.parse(localStorage.getItem('gff_completed_steps') || '{}');
  if (checked) {
    completedSteps[`${pathId}_${stepIndex}`] = true;
  } else {
    delete completedSteps[`${pathId}_${stepIndex}`];
  }
  localStorage.setItem('gff_completed_steps', JSON.stringify(completedSteps));
  // 重新渲染
  setTimeout(() => renderView('paths'), 100);
}

function completePath(pathId) {
  pathId = dec(pathId);
  const completedPaths = JSON.parse(localStorage.getItem('gff_completed_paths') || '[]');
  if (!completedPaths.includes(pathId)) {
    completedPaths.push(pathId);
    localStorage.setItem('gff_completed_paths', JSON.stringify(completedPaths));
    toast('修炼路径已完成', 'success');
    renderView('paths');
  }
}

async function genPaths() {
  const btn = document.querySelector('.topbar-actions .btn.primary');
  if (btn && btn.disabled) return;
  if (btn) { btn.disabled = true; btn.textContent = '生成中...'; }
  loadingState.paths.label = '正在生成修炼路径...';
  simulateProgress('paths', 25000);
  renderView('paths');
  try {
    const result = await api('/api/paths', 'POST');
    mapData = result.map;
    stopLoading('paths');
    toast('修炼路径生成完成', 'success');
    renderView('paths');
  } catch (e) {
    stopLoadingError('paths', e.message);
    toast(e.message, 'error');
    renderView('paths');
  }
}

async function saveTwinEdit(twinId) {
  const twin = adminTwins.find(t => t.id === twinId);
  if (!twin) return;

  const commaSplit = (val) => (val || '').split(',').map(s => s.trim()).filter(Boolean);
  const val = (id) => document.getElementById(id)?.value || '';

  const updatedPersona = {
    summary: val('edit_twin_summary'),
    background: val('edit_twin_background'),
    personality: {
      metaphor: val('edit_twin_metaphor'),
      core_tendency: val('edit_twin_core_tendency'),
      paradoxes: commaSplit(val('edit_twin_paradoxes')),
      blindspots: commaSplit(val('edit_twin_blindspots'))
    },
    stance: {
      tenets: commaSplit(val('edit_twin_tenets')),
      bottom_lines: commaSplit(val('edit_twin_bottom_lines')),
      oppositions: commaSplit(val('edit_twin_oppositions')),
      preferences: commaSplit(val('edit_twin_preferences'))
    },
    behavior_patterns: {
      on_problem: val('edit_twin_on_problem'),
      on_plan: val('edit_twin_on_plan'),
      on_emotion: val('edit_twin_on_emotion'),
      on_ambiguity: val('edit_twin_on_ambiguity'),
      decision_pace: val('edit_twin_decision_pace'),
      pressure_response: val('edit_twin_pressure_response')
    },
    motivations: {
      surface: commaSplit(val('edit_twin_surface')),
      deep: val('edit_twin_deep'),
      hidden: val('edit_twin_hidden'),
      decompositions: commaSplit(val('edit_twin_decompositions')),
      conflict: val('edit_twin_conflict')
    },
    growth: {
      direction: val('edit_twin_growth_direction'),
      breakthrough: val('edit_twin_growth_breakthrough')
    }
  };

  const username = val('edit_twin_name') || twin.username;

  try {
    const res = await api(`/api/twins/${twinId}`, 'PUT', { persona: updatedPersona, username });
    if (res.success) {
      const localTwin = adminTwins.find(t => t.id === twinId);
      if (localTwin) {
        localTwin.persona = updatedPersona;
        localTwin.username = username;
        localTwin.updatedAt = res.twin.updatedAt;
      }
      toast('分身设定已保存', 'success');
      editingTwinId = null;
      viewingTwinId = twinId;
      renderAdminTwins(document.getElementById('adminTabContent'));
    }
  } catch (e) {
    toast('保存失败: ' + e.message, 'error');
  }
}

async function loadTwinUserSelect() {
  const select = document.getElementById('twinUserSelect');
  if (!select) return;
  try {
    const users = await api('/api/growth-records/all');
    for (const u of users) {
      const opt = document.createElement('option');
      opt.value = u.userId;
      opt.textContent = `${u.username} (${u.recordCount}条记录)`;
      select.appendChild(opt);
    }
  } catch (e) { console.error(e); }
}

async function createTwin() {
  const select = document.getElementById('twinUserSelect');
  const userId = select?.value;
  if (!userId) { toast('请选择用户', 'warning'); return; }

  const btn = document.getElementById('createTwinBtn');
  const status = document.getElementById('twinCreateStatus');
  btn.disabled = true;
  btn.textContent = '创建中...';

  loadingState.twinCreate.label = '正在提取人格参数...';
  simulateProgress('twinCreate', 30000);

  try {
    const res = await api('/api/twins/create', 'POST', { userId });
    if (res.success) {
      stopLoading('twinCreate');
      toast(`分身 "${res.twin.username}" 创建成功`, 'success');
      adminTwins.push(res.twin);
      renderAdminTwins(document.getElementById('adminTabContent'));
    }
  } catch (e) {
    stopLoadingError('twinCreate', e.message);
    toast('创建失败: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = '创建分身';
  }

async function deleteTwin(twinId) {

  } catch (e) { toast('删除失败: ' + e.message, 'error'); }
}

function onTwinSelectionChange() {
  const panel = document.getElementById('twinConfigPanel');
  const rows = document.getElementById('twinConfigRows');
  if (!panel || !rows) return;

  const checked = document.querySelectorAll('.predict-twin-checkbox:checked');
  if (checked.length < 2) {
    panel.style.display = 'none';
    return;
  }

  panel.style.display = 'block';
  const selectedIds = Array.from(checked).map(cb => cb.value);

  const inputStyle = 'padding:6px 10px;border:1px solid var(--border);border-radius:6px;background:var(--card);color:var(--text);font-size:12px;box-sizing:border-box';
  const labelStyle = 'font-size:11px;color:var(--text3);margin-bottom:2px;display:block';

  rows.innerHTML = selectedIds.map(id => {
    const twin = adminTwins.find(t => t.id === id);
    const name = twin ? twin.username : id;
    const reportOptions = selectedIds
      .filter(sid => sid !== id)
      .map(sid => {
        const t = adminTwins.find(tw => tw.id === sid);
        return '<option value="' + sid + '">' + esc(t ? t.username : sid) + '</option>';
      }).join('');

    return '<div style="display:grid;grid-template-columns:120px 1fr 1fr 120px;gap:8px;align-items:end;margin-bottom:8px;padding:8px 12px;background:var(--card);border-radius:8px;border:1px solid var(--border)">' +
      '<div style="font-size:13px;font-weight:600;color:var(--text);padding-bottom:6px">' + esc(name) + '</div>' +
      '<div><label style="' + labelStyle + '">职位/角色</label><input class="config-role" data-twin="' + id + '" value="" style="' + inputStyle + ';width:100%" placeholder="如：设计组长"></div>' +
      '<div><label style="' + labelStyle + '">汇报给</label><select class="config-reports" data-twin="' + id + '" style="' + inputStyle + ';width:100%"><option value="">无（最高层）</option>' + reportOptions + '</select></div>' +
      '<div></div>' +
      '</div>';
  }).join('');
}

async function runPrediction() {
  const event = document.getElementById('predictEventInput')?.value?.trim();
  if (!event) { toast('请描述事件场景', 'warning'); return; }
  const teamContext = document.getElementById('predictTeamContext')?.value?.trim() || '';

  const checkboxes = document.querySelectorAll('.predict-twin-checkbox:checked');
  const twinIds = Array.from(checkboxes).map(cb => cb.value);
  if (twinIds.length === 0) { toast('请选择参与模拟的分身', 'warning'); return; }
  if (twinIds.length < 2) { toast('至少需要2个分身才能模拟交互', 'warning'); return; }

  const rounds = parseInt(document.getElementById('predictRoundsInput')?.value) || 3;

  // 收集角色配置
  const twinConfigs = [];
  document.querySelectorAll('.config-role').forEach(input => {
    twinConfigs.push({
      twinId: input.dataset.twin,
      role: input.value,
      reportsTo: document.querySelector('.config-reports[data-twin="' + input.dataset.twin + '"]')?.value || ''
    });
  });

  const btn = document.getElementById('predictBtn');
  btn.disabled = true;
  btn.textContent = '模拟中...';

  const roundsNum = Math.min(Math.max(rounds, 1), 10);
  loadingState.prediction.label = '行为预测模拟 (' + roundsNum + '轮)...';
  simulateProgress('prediction', roundsNum * 20000);

  try {
    const res = await api('/api/twins/simulate', 'POST', { event, twinIds, rounds, twinConfigs, teamContext });
    if (res.success) {
      stopLoading('prediction');
      toast('模拟完成', 'success');
      expandedSimId = res.simulation.id;
      adminSimulations.push(res.simulation);
      renderSimulationResult(res.simulation);
      renderAdminPredict(document.getElementById('adminTabContent'));
    }
  } catch (e) {
    stopLoadingError('prediction', e.message);
    toast('模拟失败: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = '&#128300; 开始模拟';
  }
}

    await api('/api/twins/simulations/' + simId, 'DELETE');
    adminSimulations = adminSimulations.filter(s => s.id !== simId);
    toast('模拟记录已删除', 'success');
    renderAdminPredict(document.getElementById('adminTabContent'));
  } catch (e) {
    toast('删除失败: ' + e.message, 'error');
  }
}

function renderSimulationResult(sim) {
  const resultEl = document.getElementById('predictResult');
  if (!resultEl) return;

  const rounds = sim.result?.rounds || [];
  const outcome = sim.result?.outcome || {};
  const rawText = sim.result?.raw_text;

  // 构建背景信息区
  let contextHTML = '';
  contextHTML += `<div style="padding:16px;background:var(--card2);border-radius:10px;border:1px solid var(--border);margin-bottom:16px">`;
  contextHTML += `<div style="font-size:14px;font-weight:600;color:var(--accent);margin-bottom:12px">&#127919; 场景设定</div>`;
  // 完整事件场景
  contextHTML += `<div style="font-size:13px;color:var(--text2);line-height:1.8;padding:10px 14px;background:var(--card);border-radius:8px;margin-bottom:12px"><span style="color:var(--accent);font-weight:600">&#128163; 事件：</span>${esc(sim.event)}</div>`;
  // 团队背景
  if (sim.teamContext) {
    contextHTML += `<div style="font-size:13px;color:var(--text2);line-height:1.8;padding:10px 14px;background:var(--card);border-radius:8px;margin-bottom:12px"><span style="color:var(--green);font-weight:600">&#127970; 团队背景：</span>${esc(sim.teamContext)}</div>`;
  }
  // 角色配置
  const twinConfigs = sim.twinConfigs || [];
  if (twinConfigs.length > 0) {
    contextHTML += `<div style="padding:10px 14px;background:var(--card);border-radius:8px"><div style="font-size:12px;color:var(--accent2);font-weight:600;margin-bottom:6px">&#128101; 角色配置</div>`;
    contextHTML += `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px">`;
    for (const c of twinConfigs) {
      const name = sim.twinNames[sim.twinIds.indexOf(c.twinId)] || c.twinId;
      let desc = esc(name);
      if (c.role) desc += ' · ' + esc(c.role);
      if (c.reportsTo) {
        const supName = sim.twinNames[sim.twinIds.indexOf(c.reportsTo)] || c.reportsTo;
        desc += ' · 汇报给 ' + esc(supName);
      }
      contextHTML += `<div style="padding:6px 10px;background:rgba(124,108,240,0.06);border:1px solid rgba(124,108,240,0.2);border-radius:6px;font-size:12px;color:var(--text2)">${desc}</div>`;
    }
    contextHTML += `</div></div>`;
  }
  // 参与分身概览
  contextHTML += `<div style="margin-top:10px;font-size:12px;color:var(--text3)">${sim.rounds}轮模拟 · ${sim.twinNames.join(' + ')} · ${new Date(sim.createdAt).toLocaleString()}</div>`;
  contextHTML += `</div>`;

  let html = `<div style="background:var(--card);border:1px solid var(--accent);border-radius:12px;padding:24px;margin-bottom:16px">
    <h3 style="margin:0 0 20px;font-size:16px;color:var(--accent)">&#128300; 模拟结果</h3>`;
  html += contextHTML;

  if (rawText) {
    // LLM返回了非结构化文本，直接展示
    html += `<div style="font-size:14px;color:var(--text2);line-height:1.8;white-space:pre-wrap">${esc(rawText)}</div>`;
  } else {
    // 结构化结果
    for (const round of rounds) {
      html += `<div style="margin-bottom:20px;padding:16px;background:var(--card2);border-radius:10px;border:1px solid var(--border)">
        <div style="font-size:14px;font-weight:600;color:var(--accent);margin-bottom:12px">第 ${round.round} 轮</div>`;
      for (const ev of (round.events || [])) {
        html += `<div style="margin-bottom:12px;padding:12px;background:var(--card);border-radius:8px;border:1px solid var(--border)">
          <div style="font-size:13px;font-weight:600;color:var(--text)">${esc(ev.twin)}</div>
          <div style="font-size:12px;color:var(--text3);margin-top:4px">&#128161; 内心：${esc(ev.internal || '')}</div>
          <div style="font-size:12px;color:var(--text2);margin-top:4px">&#127908; 行动：${esc(ev.action || '')}</div>
          <div style="font-size:12px;color:var(--accent2);margin-top:4px">&#128148; 情绪：${esc(ev.emotion || '')}</div>
        </div>`;
      }
      if (round.system_state) {
        html += `<div style="font-size:12px;color:var(--text3);padding:8px 12px;background:rgba(124,108,240,0.1);border-radius:6px;margin-top:8px">&#127760; 系统状态：${esc(round.system_state)}</div>`;
      }
      if (round.emerging_risks?.length) {
        html += `<div style="font-size:12px;color:#f87171;padding:8px 12px;background:rgba(248,113,113,0.1);border-radius:6px;margin-top:6px">&#9888; 浮现风险：${round.emerging_risks.map(r => esc(r)).join(' | ')}</div>`;
      }
      html += '</div>';
    }

    // 最终结论
    if (outcome.outcome_summary || outcome.key_findings) {
      html += `<div style="padding:16px;background:linear-gradient(135deg,rgba(45,212,191,0.1),rgba(124,108,240,0.1));border-radius:10px;border:1px solid var(--accent)">
        <div style="font-size:14px;font-weight:600;color:var(--accent);margin-bottom:12px">&#127919; 最终结论</div>`;
      if (outcome.outcome_summary) html += `<div style="font-size:13px;color:var(--text2);margin-bottom:8px">${esc(outcome.outcome_summary)}</div>`;
      if (outcome.key_findings?.length) html += `<div style="font-size:12px;color:var(--accent2);margin-bottom:8px">&#128270; 关键发现：${outcome.key_findings.map(f => esc(f)).join('；')}</div>`;
      if (outcome.management_risks?.length) html += `<div style="font-size:12px;color:#f87171;margin-bottom:8px">&#9888; 管理风险：${outcome.management_risks.map(r => esc(r)).join('；')}</div>`;
      if (outcome.recommendations?.length) html += `<div style="font-size:12px;color:var(--green)">&#10003; 建议：${outcome.recommendations.map(r => esc(r)).join('；')}</div>`;
      html += '</div>';
    }
  }

  // 对话入口按钮
  html += `<div style="margin-top:16px;display:flex;gap:10px;align-items:center">
    <button onclick="openSimChat('${sim.id}', 'expert')" style="padding:10px 20px;background:var(--accent2);color:white;border:none;border-radius:8px;font-size:13px;cursor:pointer;transition:all 0.15s" onmouseover="this.style.opacity='0.85'" onmouseout="this.style.opacity='1'">&#128172; 继续讨论</button>
    <span style="font-size:12px;color:var(--text3)">或选定角色对话：</span>
    ${sim.twinNames.map((name, i) =>
      `<button onclick="openSimChat('${sim.id}', 'twin', '${sim.twinIds[i]}')" style="padding:8px 14px;background:var(--card2);border:1px solid var(--border);border-radius:8px;font-size:12px;color:var(--text2);cursor:pointer;transition:all 0.15s" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border)'">${esc(name)}</button>`
    ).join('')}
  </div>`;

  // 对话面板（默认隐藏）
  html += `<div id="simChatPanel-${sim.id}" style="display:none;margin-top:12px;background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:16px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div id="simChatMode-${sim.id}" style="font-size:13px;font-weight:600;color:var(--accent)"></div>
      <button onclick="closeSimChat('${sim.id}')" style="padding:4px 10px;background:transparent;border:1px solid var(--border);border-radius:6px;font-size:11px;color:var(--text3);cursor:pointer">&#10005; 关闭</button>
    </div>
    <div id="simChatBody-${sim.id}" style="max-height:400px;overflow-y:auto;padding:8px 0;border-bottom:1px solid var(--border)">
      <div style="text-align:center;color:var(--text3);font-size:13px;padding:20px">输入你的问题，开始对话</div>
    </div>
    <div style="display:flex;gap:8px;margin-top:10px">
      <textarea id="simChatInput-${sim.id}" rows="2" placeholder="按 Enter 发送，Shift+Enter 换行..." style="flex:1;padding:10px;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--text);font-size:13px;resize:none;box-sizing:border-box"></textarea>
      <button onclick="sendSimChat('${sim.id}')" id="simChatSendBtn-${sim.id}" style="width:38px;height:38px;background:var(--accent2);color:white;border:none;border-radius:8px;cursor:pointer;font-size:16px;align-self:flex-end">&#10148;</button>
    </div>
  </div>`;

  html += '</div>';
  resultEl.innerHTML = html;
  resultEl.style.display = 'block';

  // 绑定 Enter 发送
  const chatInput = document.getElementById('simChatInput-' + sim.id);
  if (chatInput) {
    chatInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendSimChat(sim.id);
      }
    });
  }
}

let expandedSimId = null; // 当前展开的模拟ID

function toggleSimulation(simId) {
  const sim = adminSimulations.find(s => s.id === simId);
  if (!sim) return;

  // 如果点击的是当前已展开的模拟 → 收起
  if (expandedSimId === simId) {

      resultEl.style.display = 'none';

function viewSimulation(simId) {

}

// ============ 模拟对话 ============
let simChatState = {}; // { simId: { mode, twinId, messages, loading } }

function openSimChat(simId, mode, twinId) {
  const sim = adminSimulations.find(s => s.id === simId);
  if (!sim) return;

  // 初始化对话状态
  simChatState[simId] = {
    mode: mode, // 'expert' or 'twin'
    twinId: twinId || '',
    messages: [],
    loading: false
  };

  // 显示对话面板
  const panel = document.getElementById('simChatPanel-' + simId);
  if (panel) panel.style.display = 'block';

  // 显示模式标签
  const modeLabel = document.getElementById('simChatMode-' + simId);
  if (modeLabel) {
    if (mode === 'twin') {
      const twin = adminTwins.find(t => t.id === twinId);
      const twinName = twin ? twin.username : twinId;
      modeLabel.innerHTML = '&#129504; 与「' + esc(twinName) + '」对话（角色模式）';
    } else {
      modeLabel.innerHTML = '&#127919; 行为分析讨论（专家模式）';
    }
  }

  // 清空对话区域
  const body = document.getElementById('simChatBody-' + simId);
  if (body) {
    body.innerHTML = '<div style="text-align:center;color:var(--text3);font-size:13px;padding:20px">输入你的问题，开始对话</div>';
  }
}

function closeSimChat(simId) {
  const panel = document.getElementById('simChatPanel-' + simId);
  if (panel) panel.style.display = 'none';
  if (simChatState[simId]) simChatState[simId].messages = [];
}

async function sendSimChat(simId) {
  const state = simChatState[simId];
  if (!state || state.loading) return;

  const input = document.getElementById('simChatInput-' + simId);
  const body = document.getElementById('simChatBody-' + simId);
  const sendBtn = document.getElementById('simChatSendBtn-' + simId);
  if (!input || !body || !sendBtn) return;

  const content = input.value.trim();
  if (!content) return;

  // 添加用户消息
  state.messages.push({ role: 'user', content });

  // 渲染用户消息
  let chatHtml = body.innerHTML;
  // 移除空状态提示
  chatHtml = chatHtml.replace(/<div style="text-align:center;color:var\(--text3\);font-size:13px;padding:20px">.*?<\/div>/, '');
  chatHtml += `<div style="display:flex;gap:8px;margin-bottom:12px;padding:8px 12px;background:var(--card);border-radius:8px;border:1px solid var(--border)">
    <div style="font-size:12px;font-weight:600;color:var(--accent);min-width:40px">你</div>
    <div style="font-size:13px;color:var(--text2);flex:1">${esc(content)}</div>
  </div>`;

  // 显示加载
  state.loading = true;
  sendBtn.disabled = true;
  chatHtml += `<div id="simChatLoading-${simId}" style="display:flex;gap:8px;margin-bottom:12px">
    <div style="font-size:12px;font-weight:600;color:var(--accent2);min-width:40px">AI</div>
    <div style="display:flex;gap:4px;padding-top:4px">
      <span style="width:6px;height:6px;background:var(--accent2);border-radius:50%;animation:dotBounce 0.6s infinite alternate"></span>
      <span style="width:6px;height:6px;background:var(--accent2);border-radius:50%;animation:dotBounce 0.6s infinite alternate 0.15s"></span>
      <span style="width:6px;height:6px;background:var(--accent2);border-radius:50%;animation:dotBounce 0.6s infinite alternate 0.3s"></span>
    </div>
  </div>`;

  body.innerHTML = chatHtml;
  input.value = '';
  body.scrollTop = body.scrollHeight;

  try {
    const res = await api('/api/twins/simulate/chat', 'POST', {
      simId,
      messages: state.messages,
      mode: state.mode,
      twinId: state.twinId
    });

    if (res.success) {
      // 移除加载动画
      const loadingEl = document.getElementById('simChatLoading-' + simId);
      if (loadingEl) loadingEl.remove();

      const reply = res.reply;
      state.messages.push({ role: 'assistant', content: reply });

      // 渲染 AI 回复（支持 Markdown）
      let replyHtml = reply;
      if (typeof marked !== 'undefined') {
        replyHtml = marked.parse(reply);
      } else {
        replyHtml = esc(reply).replace(/\n/g, '<br>');
      }

      const aiLabel = state.mode === 'twin'
        ? (adminTwins.find(t => t.id === state.twinId)?.username || '分身')
        : '行为专家';

      body.innerHTML += `<div style="display:flex;gap:8px;margin-bottom:12px;padding:8px 12px;background:var(--card2);border-radius:8px;border:1px solid var(--border)">
        <div style="font-size:12px;font-weight:600;color:var(--accent2);min-width:50px">${esc(aiLabel)}</div>
        <div style="font-size:13px;color:var(--text2);flex:1;line-height:1.6">${replyHtml}</div>
      </div>`;
      body.scrollTop = body.scrollHeight;
    }
  } catch (e) {
    const loadingEl = document.getElementById('simChatLoading-' + simId);
    if (loadingEl) loadingEl.remove();
    body.innerHTML += `<div style="font-size:12px;color:#f87171;padding:8px">对话失败: ${esc(e.message)}</div>`;
  } finally {
    state.loading = false;
    sendBtn.disabled = false;
  }
}

async function loadMultiUserComparison(container, userIds) {
  container.innerHTML = '<div style="color:var(--text3);font-size:13px;padding:16px">加载数据中...</div>';
  
  try {
    const usersWithMaps = await Promise.all(userIds.map(async (userId) => {
      try {
        const userData = adminUsersData.find(u => u.userId === userId);
        const recordsRes = await api(`/api/growth-records/user/${userId}`).catch(() => ({ records: [] }));
        const mapRes = await api(`/api/map?userId=${userId}`).catch(() => null);
        return { 
          ...userData, 
          records: recordsRes.records || [],
          mapData: mapRes 
        };
      } catch {
        return null;
      }
    }));
    
    const validUsers = usersWithMaps.filter(u => u && u.records && u.records.length > 0);
    
    if (validUsers.length === 0) {
      container.innerHTML = '<div style="color:var(--text3);font-size:13px;padding:16px">暂无成长轨迹数据</div>';
      return;
    }
    
    // 用户颜色
    const USER_COLORS = ['#f87171', '#fbbf24', '#2dd4bf', '#a78bfa', '#60a5fa', '#f472b6', '#34d399', '#fb923c'];
    
    // 计算每个用户的累计已具备能力数量（按日期）
    const userCurves = validUsers.map((user, idx) => {
      const byDay = {};
      (user.records || []).forEach(r => { byDay[r.timestamp.split('T')[0]] = r; });
      const days = Object.keys(byDay).sort();
      let cumulative = 0;
      const points = days.map(day => {
        const possessedDims = Object.values(byDay[day].dimensions || {}).filter(s => s === 'possessed').length;
        cumulative += possessedDims;
        return { day, value: cumulative };
      });
      return {
        username: user.username || user.userId,
        color: USER_COLORS[idx % USER_COLORS.length],
        points
      };
    });
    
    // 收集所有日期
    const allDaysSet = new Set();
    userCurves.forEach(uc => uc.points.forEach(p => allDaysSet.add(p.day)));
    const allDays = Array.from(allDaysSet).sort();
    
    // 生成折线图SVG
    let chartHtml = '';
    if (allDays.length >= 2) {
      const W = 700, H = 200, padL = 55, padR = 20, padT = 24, padB = 44;
      const plotW = W - padL - padR, plotH = H - padT - padB;
      const xStep = plotW / Math.max(allDays.length - 1, 1);
      const toX = i => padL + i * xStep;
      
      // 计算Y轴范围
      const allValues = userCurves.flatMap(uc => uc.points.map(p => p.value));
      const rawMax = Math.max(...allValues, 0);
      const yMax = rawMax + 5;
      const yMin = 0;
      const yRange = yMax - yMin;
      const toY = v => padT + plotH - v / yRange * plotH;
      
      // Y轴刻度线
      const yAxisLines = [];
      const yStep = yMax <= 10 ? 2 : (yMax <= 30 ? 5 : 10);
      for (let v = yMin; v <= yMax; v += yStep) {
        const y = toY(v);
        yAxisLines.push(`<line x1="${padL}" y1="${y}" x2="${W - padR}" y2="${y}" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>`);
        yAxisLines.push(`<text x="${padL - 8}" y="${y + 4}" text-anchor="end" font-size="11" fill="var(--text3)">${v}</text>`);
      }
      
      // X轴日期标签
      const xAxisTexts = allDays.map((day, i) => {
        const x = toX(i);
        return `<text x="${x}" y="${H - 8}" text-anchor="middle" font-size="11" fill="var(--text3)">${fmtDate(day)}</text>`;
      });
      
      // 绘制每条用户线
      const lines = userCurves.map(uc => {
        const svgPoints = uc.points.map(p => {
          const idx = allDays.indexOf(p.day);
          return { x: toX(idx), y: toY(p.value), v: p.value, day: p.day };
        }).filter(p => p.x >= padL && p.x <= W - padR);
        
        let result = '';
        if (svgPoints.length >= 2) {
          // 多于1个点：画线和点
          const pathD = svgPoints.map((p, i) => (i === 0 ? 'M' : 'L') + p.x + ',' + p.y).join(' ');
          const circles = svgPoints.map(p =>
            `<circle cx="${p.x}" cy="${p.y}" r="4" fill="${uc.color}" stroke="var(--bg)" stroke-width="2" data-user="${esc(uc.username)}" data-value="${p.v}" data-day="${esc(p.day)}" style="cursor:pointer"/>`).join('');
          result = `<path d="${pathD}" fill="none" stroke="${uc.color}" stroke-width="2.5" stroke-linejoin="round" opacity="0.9"/>${circles}`;
        } else if (svgPoints.length === 1) {
          // 只有1个点：画一个大的点
          const p = svgPoints[0];
          result = `<circle cx="${p.x}" cy="${p.y}" r="6" fill="${uc.color}" stroke="var(--bg)" stroke-width="2" data-user="${esc(uc.username)}" data-value="${p.v}" data-day="${esc(p.day)}" style="cursor:pointer"/>`;
        }
        return result;
      }).join('');
      
      chartHtml = `
        <div class="track-chart-section">
          <div class="track-chart-title">&#128200; 成长轨迹对比</div>
          <div class="track-chart-sub">已具备能力总数（累计）</div>
          <div class="track-chart-wrap" id="multiUserChartWrap">
            <svg class="track-chart-canvas" id="multiUserChartSvg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
              ${yAxisLines.join('')}
              ${xAxisTexts.join('')}
              <line id="multiChartHoverLine" x1="0" y1="${padT}" x2="0" y2="${H - padB}" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-dasharray="4,4" style="display:none;pointer-events:none"/>
              ${lines}
            </svg>
            <div class="track-chart-tooltip" id="multiUserChartTooltip"></div>
          </div>
          <div class="track-chart-legend">
            ${userCurves.map(uc => `<div class="track-chart-legend-item"><div class="track-chart-legend-dot" style="background:${uc.color}"></div>${esc(uc.username)}</div>`).join('')}
          </div>
        </div>`;
    } else {
      chartHtml = '<div style="color:var(--text3);font-size:13px;padding:32px;text-align:center">数据点不足，无法生成对比图</div>';
    }
    
    // 生成对比HTML
    let html = `<div style="display:grid;grid-template-columns:repeat(${Math.min(validUsers.length, 3)},1fr);gap:16px;margin-bottom:24px">`;
    
    validUsers.forEach(user => {
      const possessedCount = (user.mapData?.dimensions || []).filter(d => d.status === 'possessed').length;
      const developingCount = (user.mapData?.dimensions || []).filter(d => d.status === 'developing').length;
      const blindCount = (user.mapData?.blindSpots || []).length;
      const recordCount = (user.records || []).length;
      
      html += `
        <div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center">
          <div style="font-size:15px;font-weight:600;color:var(--text);margin-bottom:12px">${esc(user.username || user.userId)}</div>
          <div style="display:flex;justify-content:center;gap:16px;font-size:12px">
            <div><span style="color:var(--green);font-weight:600">${possessedCount}</span><span style="color:var(--text3)"> 已具备</span></div>
            <div><span style="color:var(--orange);font-weight:600">${developingCount}</span><span style="color:var(--text3)"> 待发展</span></div>
            <div><span style="color:var(--red);font-weight:600">${blindCount}</span><span style="color:var(--text3)"> 盲区</span></div>
          </div>
          <div style="margin-top:8px;font-size:11px;color:var(--text3)">${recordCount}条分析记录</div>
        </div>`;
    });
    
    html += '</div>';
    
    // 添加折线图对比
    html += '<div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-top:16px">' + chartHtml + '</div>';
    
    container.innerHTML = html;
    
    // 添加tooltip交互
    const svgEl = document.getElementById('multiUserChartSvg');
    const tooltip = document.getElementById('multiUserChartTooltip');
    const hoverLine = document.getElementById('multiChartHoverLine');
    
    if (svgEl && tooltip && hoverLine) {
      svgEl.addEventListener('mousemove', (e) => {
        const rect = svgEl.getBoundingClientRect();
        const svgX = (e.clientX - rect.left) / rect.width * 700;
        const padL = 55, padR = 20, plotW = 700 - padL - padR;
        const relativeX = svgX - padL;
        
        if (relativeX < 0 || relativeX > plotW) {
          tooltip.classList.remove('show');
          hoverLine.style.display = 'none';
          return;
        }
        
        const idx = Math.round(relativeX / (plotW / Math.max(allDays.length - 1, 1)));
        const day = allDays[Math.max(0, Math.min(idx, allDays.length - 1))];
        
        hoverLine.setAttribute('x1', padL + idx * (plotW / Math.max(allDays.length - 1, 1)));
        hoverLine.setAttribute('x2', padL + idx * (plotW / Math.max(allDays.length - 1, 1)));
        hoverLine.style.display = 'block';
        
        let tooltipContent = `<div style="font-weight:700;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)">${fmtDate(day)}</div>`;
        userCurves.forEach(uc => {
          const point = uc.points.find(p => p.day === day);
          const value = point ? point.value : '-';
          tooltipContent += `<div style="display:flex;align-items:center;gap:8px;padding:3px 0">
            <div style="width:8px;height:8px;border-radius:50%;background:${uc.color};flex-shrink:0"></div>
            <div style="flex:1;font-size:12px;color:var(--text2)">${esc(uc.username)}</div>
            <div style="font-weight:700;font-size:13px;color:${uc.color}">${value}个</div>
          </div>`;
        });
        
        tooltip.innerHTML = tooltipContent;
        
        let tx = svgX - 110;
        tx = Math.max(8, Math.min(tx, rect.width - 230));
        tooltip.style.left = tx + 'px';
        tooltip.style.top = '20px';
        tooltip.classList.add('show');
      });
      
      svgEl.addEventListener('mouseleave', () => {
        tooltip.classList.remove('show');
        hoverLine.style.display = 'none';
      });
    }
  } catch (e) {
    container.innerHTML = '<div style="color:var(--red);font-size:13px;padding:16px">加载失败: ' + esc(e.message) + '</div>';
  }
}

async function loadTeamOverview(container) {
  container.innerHTML = '<div style="color:var(--text3);font-size:13px;padding:16px">加载团队数据中...</div>';
  const _teamDimIdsMap = {}; // userId -> catId -> [dimIds]
  
  try {
    // 获取所有用户的数据
    const allRecords = await api('/api/growth-records/all');
    
    if (allRecords.length === 0) {
      container.innerHTML = '<div style="color:var(--text3);font-size:13px;padding:16px">暂无团队数据</div>';
      return;
    }
    
    // 为每个用户加载 cognition-map
    const userPromises = allRecords.slice(0, 10).map(async (user) => {
      try {
        const mapRes = await api(`/api/map?userId=${user.userId}`).catch(() => null);
        return { ...user, mapData: mapRes };
      } catch {
        return { ...user, mapData: null };
      }
    });
    
    const usersWithMaps = await Promise.all(userPromises);
    
    // 聚合所有分类数据
    const allCategories = new Set();
    const categoryStats = {};
    
    usersWithMaps.forEach(user => {
      if (user.mapData?.categories) {
        user.mapData.categories.forEach(cat => {
          allCategories.add(cat.id);
          if (!categoryStats[cat.id]) {
            categoryStats[cat.id] = { name: cat.name, possessed: 0, developing: 0, total: 0 };
          }
          // Build dimIds map from dimensions for this user
          const _uid = user.userId;
          if (!_teamDimIdsMap[_uid]) {
            _teamDimIdsMap[_uid] = {};
            for (const d of (user.mapData.dimensions || [])) {
              if (d.category) {
                if (!_teamDimIdsMap[_uid][d.category]) _teamDimIdsMap[_uid][d.category] = [];
                _teamDimIdsMap[_uid][d.category].push(d.id);
              }
            }
          }
          categoryStats[cat.id].total++;
          const dims = cat.dimIds || _teamDimIdsMap[_uid][cat.id] || [];
          const possessed = dims.filter(id => {
            const dim = (user.mapData.dimensions || []).find(d => d.id === id);
            return dim?.status === 'possessed';
          }).length;
          const developing = dims.filter(id => {
            const dim = (user.mapData.dimensions || []).find(d => d.id === id);
            return dim?.status === 'developing';
          }).length;
          categoryStats[cat.id].possessed += possessed;
          categoryStats[cat.id].developing += developing;
        });
      }
    });
    
    const categories = Array.from(allCategories).map(id => ({
      id,
      ...categoryStats[id]
    }));
    
    // 生成团队能力热力图
    const heatmapHtml = categories.length > 0 ? `
      <div style="margin-top:24px">
        <div style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:12px">&#128202; 团队能力分布</div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px">
          ${categories.map(cat => {
            const avgPossessed = cat.total > 0 ? (cat.possessed / cat.total).toFixed(1) : '0';
            const strength = cat.possessed / Math.max(cat.total, 1);
            let bgColor = 'rgba(45,212,191,0.1)';
            let textColor = 'var(--text2)';
            if (strength >= 0.5) { bgColor = 'rgba(45,212,191,0.25)'; textColor = 'var(--green)'; }
            else if (strength >= 0.3) { bgColor = 'rgba(251,191,36,0.15)'; textColor = 'var(--orange)'; }
            else if (strength > 0) { bgColor = 'rgba(248,113,113,0.1)'; textColor = 'var(--red)'; }
            return `
              <div style="padding:12px;background:${bgColor};border-radius:8px;border:1px solid var(--border)">
                <div style="font-size:12px;font-weight:600;color:${textColor};margin-bottom:4px">${esc(cat.name)}</div>
                <div style="font-size:11px;color:var(--text3)">
                  <span style="color:var(--green);font-weight:600">${cat.possessed}</span> 已具备 / 
                  <span style="color:var(--orange);font-weight:600">${cat.developing}</span> 待发展
                </div>
                <div style="margin-top:6px;height:4px;background:var(--card3);border-radius:2px;overflow:hidden">
                  <div style="height:100%;width:${Math.min(strength * 100, 100)}%;background:var(--green);border-radius:2px"></div>
                </div>
              </div>
            `;
          }).join('')}
        </div>
      </div>
    ` : '';
    
    // 用户列表
    const userListHtml = `
      <div style="margin-top:24px">
        <div style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:12px">&#128101; 团队成员</div>
        <div style="display:flex;flex-direction:column;gap:8px">
          ${usersWithMaps.map(user => {
            const dims = user.mapData?.dimensions || [];
            const possessed = dims.filter(d => d.status === 'possessed').length;
            const developing = dims.filter(d => d.status === 'developing').length;
            return `
              <div style="padding:12px;background:var(--card2);border:1px solid var(--border);border-radius:8px;display:flex;align-items:center;gap:12px;cursor:pointer" onclick="document.getElementById('trackUserSelect').value='${user.userId}';loadAdminTrackView()">
                <div style="width:32px;height:32px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff">
                  ${(user.username || '?')[0].toUpperCase()}
                </div>
                <div style="flex:1">
                  <div style="font-size:13px;font-weight:600;color:var(--text)">${esc(user.username)}</div>
                  <div style="font-size:11px;color:var(--text3)">${user.recordCount || 0} 条成长记录</div>
                </div>
                <div style="text-align:right">
                  <div style="font-size:12px"><span style="color:var(--green)">${possessed}</span> 已具备 / <span style="color:var(--orange)">${developing}</span> 待发展</div>
                </div>
              </div>
            `;
          }).join('')}
        </div>
      </div>
    `;
    
    container.innerHTML = `
      <div style="padding:16px">
        <div style="font-size:16px;font-weight:600;color:var(--text);margin-bottom:8px">团队概览</div>
        <div style="font-size:13px;color:var(--text3);margin-bottom:16px">${usersWithMaps.length} 位团队成员</div>
        ${heatmapHtml}
        ${userListHtml}
      </div>
    `;
  } catch (e) {
    container.innerHTML = '<div style="color:var(--red);font-size:13px;padding:16px">加载失败: ' + esc(e.message) + '</div>';
  }
}

async function deleteRecord(recordId) {
  recordId = dec(recordId);
  if (!confirm('确定要删除这条录音分析记录吗？')) return;
  try {
    const res = await api(`/api/growth-records/${recordId}`, 'DELETE');
    toast('记录已删除', 'success');
    // 刷新当前视图
    switchView('admin');
  } catch (e) {
    toast('删除失败: ' + e.message, 'error');
  }
}

async function loadMyTrack() {
  const el = document.getElementById('trackMyContent');
  await loadUserTrack(el, null, false, currentUser?.username);
}

async function loadUserTrack(el, userId, showAdmin, username = '') {
  el.innerHTML = '<div style="color:var(--text3);padding:16px">加载中...</div>';
  try {
    let records;
    let trackMapData = null;

    // 并行加载成长记录和 cognition-map
    const [recordsRes, mapRes] = await Promise.all([
      userId ? api(`/api/growth-records/user/${userId}`) : api('/api/growth-records'),
      (async () => {
        try { return await api('/api/map'); } catch { return null; }
      })()
    ]);
    records = recordsRes.records || [];
    trackMapData = mapRes;

    if (records.length === 0) {
      el.innerHTML = `<div class="empty-state"><div class="icon">&#128200;</div><h3>还没有成长轨迹</h3><p>分析录音后，成长轨迹会自动记录你的能力变化</p></div>`;
      return;
    }

    // 从目标用户的 cognition-map 获取分类结构
    const trackCategories = (trackMapData && trackMapData.categories) ? trackMapData.categories : [];
    const CATEGORY_COLORS = [
      '#f87171', '#fbbf24', '#2dd4bf', '#a78bfa', '#60a5fa', '#f472b6', '#34d399'
    ];
    const CATEGORIES = trackCategories.map((cat, i) => ({
      id: cat.id,
      name: cat.name || cat.id,
      color: CATEGORY_COLORS[i % CATEGORY_COLORS.length],
    }));

    // 建立 dimId -> categoryId 的映射（兼容无dimIds的情况，从dimensions反向构建）
    const dimToCat = {};
    const trackDims = (trackMapData && trackMapData.dimensions) ? trackMapData.dimensions : [];
    for (const dim of trackDims) {
      if (dim.category) dimToCat[dim.id] = dim.category;
    }
    // 覆盖：分类的dimIds优先（若有）
    trackCategories.forEach(cat => {
      (cat.dimIds || []).forEach(id => dimToCat[id] = cat.id);
    });

    // 按日期分组（合并同一天所有记录的 dimensions）
    const byDay = {};
    records.forEach(r => {
      const day = r.timestamp.split('T')[0];
      if (!byDay[day]) byDay[day] = { dimensions: {}, source: r.source };
      // 合并该天所有记录的 dimensions（不去重，因为每次分析新增的维度不会重复）
      Object.entries(r.dimensions || {}).forEach(([id, s]) => {
        byDay[day].dimensions[id] = s;
      });
    });
    const days = Object.keys(byDay).sort();
    const dayRecords = days.map(d => byDay[d]);

    // 计算每天每个分类的已具备能力数量（累计，从第一天到当天）
    const catCountsByDay = CATEGORIES.map(cat => {
      let cumulative = 0;
      const points = dayRecords.map(r => {
        const dayCount = Object.entries(r.dimensions || {})
          .filter(([id, s]) => dimToCat[id] === cat.id && s === 'possessed')
          .length;
        cumulative += dayCount;
        return cumulative;
      });
      return { ...cat, points };
    });

    // 生成折线图
    let chartHtml = '';
    if (dayRecords.length >= 2) {
      const W = 700, H = 200, padL = 55, padR = 20, padT = 24, padB = 44;
      const plotW = W - padL - padR, plotH = H - padT - padB;
      const xStep = plotW / Math.max(dayRecords.length - 1, 1);
      const toX = i => padL + i * xStep;

      // Y轴：上限 = 最大已具备数量 + 10，最小为 10
      const allCounts = catCountsByDay.flatMap(c => c.points);
      const rawMax = Math.max(...allCounts, 0);
      const yMax = rawMax + 10;
      const yMin = 0;
      const yRange = yMax - yMin;
      const toY = v => padT + plotH - v / yRange * plotH;

      // Y轴刻度线
      const yAxisLines = [];
      const yStep = yMax <= 20 ? 5 : (yMax <= 50 ? 10 : 20);
      for (let v = yMin; v <= yMax; v += yStep) {
        const y = toY(v);
        yAxisLines.push(`<line x1="${padL}" y1="${y}" x2="${W - padR}" y2="${y}" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>`);
        yAxisLines.push(`<text x="${padL - 8}" y="${y + 4}" text-anchor="end" font-size="11" fill="var(--text3)">${v}</text>`);
      }

      // X轴日期标签
      const xAxisTexts = days.map((day, i) => {
        const x = toX(i);
        return `<text x="${x}" y="${H - 8}" text-anchor="middle" font-size="11" fill="var(--text3)">${fmtDate(day)}</text>`;
      });

      // 绘制每条分类线
      const lines = catCountsByDay.map((cat, ci) => {
        const validPoints = cat.points.map((v, i) => v !== null ? { x: toX(i), y: toY(v), i, v } : null).filter(Boolean);
        if (validPoints.length < 2) return '';
        const pathD = validPoints.map((p, i) => (i === 0 ? 'M' : 'L') + p.x + ',' + p.y).join(' ');
        const circles = validPoints.map(p =>
          `<circle cx="${p.x}" cy="${p.y}" r="4.5" fill="${cat.color}" stroke="var(--bg)" stroke-width="2" data-cat="${ci}" data-idx="${p.i}" style="cursor:pointer"/>`).join('');
        return `<path d="${pathD}" fill="none" stroke="${cat.color}" stroke-width="2.5" stroke-linejoin="round" opacity="0.9"/>${circles}`;
      }).join('');

      // 管理员视图显示用户名，普通视图显示"我的成长轨迹"
      const chartTitle = showAdmin ? `${esc(username || userId)} 的成长轨迹` : '五维能力成长轨迹';
      const chartSub = showAdmin ? '已具备能力累计数量' : '已具备能力累计数量（维度新增已具备能力 = 线上累加）';
      
      chartHtml = `
        <div class="track-chart-section">
          <div class="track-chart-title">&#128200; ${chartTitle}</div>
          <div class="track-chart-sub">${chartSub}</div>
          <div class="track-chart-wrap" id="trackChartWrap">
            <svg class="track-chart-canvas" id="trackSvg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
              ${yAxisLines.join('')}
              ${xAxisTexts.join('')}
              <line id="chartHoverLine" x1="0" y1="${padT}" x2="0" y2="${H - padB}" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-dasharray="4,4" style="display:none;pointer-events:none"/>
              <circle id="chartHoverDots" r="5" style="display:none;pointer-events:none"/>
              ${lines}
            </svg>
            <div class="track-chart-tooltip" id="chartTooltip"></div>
          </div>
          <div class="track-chart-legend">
            ${catCountsByDay.map(cat => `<div class="track-chart-legend-item"><div class="track-chart-legend-dot" style="background:${cat.color}"></div>${esc(cat.name)}</div>`).join('')}
          </div>
        </div>`;
    }

    // 检测里程碑
    const milestones = [];
    const achievedMilestones = JSON.parse(localStorage.getItem('gff_milestones') || '[]');
    
    // 首次分析
    if (records.length >= 1 && !achievedMilestones.includes('first_analysis')) {
      milestones.push({ type: 'first_analysis', icon: '&#127793;', title: '首次分析', desc: '开始构建能力图谱', date: records[0].timestamp.split('T')[0] });
    }
    
    // 首次发现盲区
    const firstBlindRecord = records.find(r => Object.values(r.dimensions || {}).some(s => s === 'blind'));
    if (firstBlindRecord && !achievedMilestones.includes('first_blind')) {
      milestones.push({ type: 'first_blind', icon: '&#128065;', title: '发现盲区', desc: '开始感知未知领域', date: firstBlindRecord.timestamp.split('T')[0] });
    }
    
    // 首次形成核心组合
    const firstComboRecord = records.find(r => r.combinations && r.combinations.length > 0);
    if (firstComboRecord && !achievedMilestones.includes('first_combo')) {
      milestones.push({ type: 'first_combo', icon: '&#9889;', title: '核心组合形成', desc: '识别能力协同效应', date: firstComboRecord.timestamp.split('T')[0] });
    }
    
    // 记录新达成的里程碑
    milestones.forEach(m => {
      if (!achievedMilestones.includes(m.type)) {
        achievedMilestones.push(m.type);
      }
    });
    if (milestones.length > 0) {
      localStorage.setItem('gff_milestones', JSON.stringify(achievedMilestones));
    }
    
    const milestonesHtml = milestones.length > 0 ? `
      <div style="margin-bottom:24px">
        <div style="font-size:13px;font-weight:600;color:var(--accent2);margin-bottom:12px;display:flex;align-items:center;gap:6px">
          &#127941; 成长里程碑
        </div>
        <div style="display:flex;flex-direction:column;gap:8px">
          ${milestones.map(m => `
            <div style="padding:12px 16px;background:linear-gradient(135deg,rgba(124,108,240,0.08),rgba(124,108,240,0.04));border:1px solid rgba(124,108,240,0.2);border-radius:10px;display:flex;align-items:center;gap:12px">
              <div style="font-size:20px">${m.icon}</div>
              <div style="flex:1">
                <div style="font-size:13px;font-weight:600;color:var(--text)">${m.title}</div>
                <div style="font-size:12px;color:var(--text3)">${m.desc}</div>
              </div>
              <div style="font-size:11px;color:var(--accent2)">${fmtDate(m.date)}</div>
            </div>
          `).join('')}
        </div>
      </div>
    ` : '';

    // 按日期分组的记录卡片（当天纵向叠加）
    const recordsByDay = {};
    records.forEach(r => {
      const day = r.timestamp.split('T')[0];
      if (!recordsByDay[day]) recordsByDay[day] = [];
      recordsByDay[day].push(r);
    });

    const dayGroupedHtml = Object.entries(recordsByDay)
      .sort(([a], [b]) => b.localeCompare(a))  // 最新日期在前
      .map(([day, dayRecs]) => `
        <div class="track-day-group">
          <div class="track-day-label">
            <span class="track-day-date">${fmtDate(day)}</span>
            <span class="track-day-count">${dayRecs.length}条记录</span>
          </div>
          <div class="track-day-cards">
            ${dayRecs.map(r => `
              <div class="track-record-card">
                <div class="track-record-header">
                  <span class="track-record-source">${esc(r.source)}</span>
                  ${r.completedPaths?.length ? `<span class="track-record-badge">&#127793; ${r.completedPaths.length}个路径完成</span>` : ''}
                  <button class="track-record-delete" onclick="deleteRecord('${enc(r.id)}')" title="删除此记录" style="margin-left:auto;background:none;border:none;color:var(--text3);cursor:pointer;font-size:12px;padding:4px 8px;border-radius:6px;transition:all 0.2s">&#128465; 删除</button>
                </div>
                <div class="track-record-dims">
                  ${Object.entries(r.dimensions || {}).filter(([,s]) => s && s !== 'no_data').map(([id, state]) => {
                    const dim = getDimById(id);
                    return `<span class="track-record-tag ${state}" onclick="navigateToDim('${enc(id)}')" style="cursor:pointer">${dim ? esc(dim.name) : id}</span>`;
                  }).join('')}
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `).join('');

    // 根据是否为管理员视图决定是否显示记录卡片
    const html = showAdmin
      ? `${username ? `<div style="margin-bottom:16px"><span style="font-size:16px;font-weight:700;color:var(--text)">${esc(username)} 的成长轨迹</span></div>` : ''}${chartHtml}`
      : `${chartHtml}${milestonesHtml}<div class="track-records-by-day">${dayGroupedHtml}</div>`;

    el.innerHTML = html;

    // 折线图 tooltip 交互 - 显示该日期所有分类数据
    const svgEl = el.querySelector('#trackSvg');
    const tooltip = el.querySelector('#chartTooltip');
    const hoverLine = el.querySelector('#chartHoverLine');
    const hoverDotsGroup = el.querySelector('#chartHoverDots');
    
    if (svgEl && tooltip && catCountsByDay.length > 0) {
      const wrap = document.getElementById('trackChartWrap');
      const rect = wrap.getBoundingClientRect();
      const svgW = 700, svgH = 200;
      const padL = 55, padR = 20;
      const plotW = svgW - padL - padR;
      
      // 根据鼠标X坐标计算日期索引
      function getIdxFromX(clientX) {
        const wrapRect = wrap.getBoundingClientRect();
        const svgRect = svgEl.getBoundingClientRect();
        const scaleX = svgW / svgRect.width;
        const svgX = (clientX - svgRect.left) * scaleX;
        const relativeX = svgX - padL;
        if (relativeX < 0 || relativeX > plotW) return -1;
        const idx = Math.round(relativeX / (plotW / Math.max(days.length - 1, 1)));
        return Math.max(0, Math.min(idx, days.length - 1));
      }
      
      function showTooltip(idx) {
        if (idx < 0 || idx >= days.length) return;
        
        // 构建所有分类的数据
        const rec = dayRecords[idx];
        let itemsHtml = catCountsByDay.map(cat => {
          const v = cat.points[idx] || 0;
          return `<div style="display:flex;align-items:center;gap:8px;padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.04)">
            <div style="width:8px;height:8px;border-radius:50%;background:${cat.color};flex-shrink:0"></div>
            <div style="flex:1;color:var(--text2);font-size:12px">${esc(cat.name)}</div>
            <div style="font-weight:700;font-size:13px;color:${cat.color}">${v}个</div>
          </div>`;
        }).join('');
        
        // 计算总计
        const total = catCountsByDay.reduce((sum, cat) => sum + (cat.points[idx] || 0), 0);
        
        tooltip.innerHTML = `
          <div style="font-weight:700;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)">${fmtDate(days[idx])}</div>
          <div style="font-size:11px;color:var(--text3);margin-bottom:8px;max-width:220px;word-break:break-all">${esc(rec.source)}</div>
          <div style="margin-bottom:8px">${itemsHtml}</div>
          <div style="display:flex;align-items:center;gap:6px;padding-top:6px;border-top:1px solid var(--border);margin-top:4px">
            <div style="font-size:12px;color:var(--text3)">合计</div>
            <div style="font-size:16px;font-weight:900;color:var(--accent)">${total}个</div>
          </div>
        `;
        
        // 计算tooltip位置
        const xStep = plotW / Math.max(days.length - 1, 1);
        const tooltipX = padL + idx * xStep;
        let tx = tooltipX / svgW * rect.width - 110;
        let ty = 20;
        tx = Math.max(8, Math.min(tx, rect.width - 230));
        
        tooltip.style.left = tx + 'px';
        tooltip.style.top = ty + 'px';
        tooltip.classList.add('show');
        
        // 显示hover指示线
        if (hoverLine) {
          hoverLine.setAttribute('x1', tooltipX);
          hoverLine.setAttribute('x2', tooltipX);
          hoverLine.style.display = 'block';
        }
      }
      
      function hideTooltip() {
        tooltip.classList.remove('show');
        if (hoverLine) hoverLine.style.display = 'none';
      }
      
      // 鼠标移动时实时计算
      svgEl.addEventListener('mousemove', (e) => {
        const idx = getIdxFromX(e.clientX);
        if (idx >= 0) {
          showTooltip(idx);
        } else {
          hideTooltip();
        }
      });
      
      svgEl.addEventListener('mouseleave', () => {
        hideTooltip();
      });
    }
  } catch (e) {
    el.innerHTML = `<div style="color:var(--red);padding:16px">加载失败: ${esc(e.message || '未知错误')}</div>`;
  }
}

function drawRadarOnCanvas(canvas, axes, overrideSize) {
  if (!canvas || !axes || axes.length < 3) return;
  const rect = canvas.parentElement.getBoundingClientRect();
  let size = overrideSize || Math.min(rect.width, rect.height);
  if (!size || size < 100) size = 300;
  const bottomPad = 45; // extra space for legend
  canvas.width = size * 2; canvas.height = (size + bottomPad) * 2;
  canvas.style.width = size + 'px'; canvas.style.height = (size + bottomPad) + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(2, 2);

  const cx = size / 2, cy = size / 2;
  const maxR = size * 0.30;
  const n = axes.length;
  if (n < 3) return;
  const angleStep = (Math.PI * 2) / n;

  // Calculate max evidence across all axes for normalization
  let maxTotalEvid = 0;
  axes.forEach(axis => {
    const totalEvid = (axis.dimIds || []).reduce((sum, id) => {
      const dim = getDimById(id);
      return sum + (dim?.evidence?.length || 0);
    }, 0);
    if (totalEvid > maxTotalEvid) maxTotalEvid = totalEvid;
  });
  if (maxTotalEvid === 0) maxTotalEvid = 1;

  // Grid rings
  for (let ring = 1; ring <= 4; ring++) {
    const r = (maxR / 4) * ring;
    ctx.beginPath();
    for (let i = 0; i <= n; i++) {
      const a = -Math.PI / 2 + i * angleStep;
      const x = cx + Math.cos(a) * r, y = cy + Math.sin(a) * r;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.strokeStyle = 'rgba(255,255,255,0.05)';
    ctx.stroke();
    // Ring labels
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.font = '9px "Noto Sans SC"';
    ctx.textAlign = 'left';
    ctx.fillText(Math.round(ring / 4 * maxTotalEvid) + '', cx + 3, cy - r + 10);
  }

  // Axis lines
  for (let i = 0; i < n; i++) {
    const a = -Math.PI / 2 + i * angleStep;
    ctx.beginPath(); ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.cos(a) * maxR, cy + Math.sin(a) * maxR);
    ctx.strokeStyle = 'rgba(255,255,255,0.07)';
    ctx.stroke();
  }

  const colors = RADAR_COLORS;

  // Possessed data polygon
  const possessedPoints = axes.map(axis => {
    const dimIds = (axis.dimIds || []).filter(id => { const d = getDimById(id); return d && d.status === 'possessed'; });
    const totalEvid = dimIds.reduce((sum, id) => {
      const dim = getDimById(id);
      return sum + (dim?.evidence?.length || 0);
    }, 0);
    return Math.max(totalEvid / maxTotalEvid, 0.08);
  });

  ctx.beginPath();
  for (let i = 0; i <= n; i++) {
    const idx = i % n;
    const a = -Math.PI / 2 + idx * angleStep;
    const r = possessedPoints[idx] * maxR;
    const x = cx + Math.cos(a) * r, y = cy + Math.sin(a) * r;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.fillStyle = 'rgba(108,92,231,0.15)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(108,92,231,0.7)';
  ctx.lineWidth = 2;
  ctx.stroke();

  // "己所向" overlay = 己所能 + 待发展 + 盲区 = full scope (pink dashed)
  const aspPoints = axes.map((axis, idx) => {
    let total = possessedPoints[idx];
    // Developing contribution
    const devIds = (axis.dimIds || []).filter(id => { const d = getDimById(id); return d && d.status === 'developing'; });
    if (devIds.length > 0) {
      const totalEvid = devIds.reduce((sum, id) => {
        const dim = getDimById(id);
        return sum + (dim?.evidence?.length || 0);
      }, 0);
      total += Math.max(totalEvid / maxTotalEvid, 0.08);
    }
    // Blind contribution
    const blindIds = axis.blindIds || [];
    if (blindIds.length > 0) {
      total += Math.min(0.15 * blindIds.length, 0.3);
    }
    return Math.min(total, 1.0);
  });

  const hasAsp = aspPoints.some(v => v > 0);
  if (hasAsp) {
    ctx.beginPath();
    let started = false;
    for (let i = 0; i <= n; i++) {
      const idx = i % n;
      if (aspPoints[idx] === 0) continue;
      const a = -Math.PI / 2 + idx * angleStep;
      const r = aspPoints[idx] * maxR;
      const x = cx + Math.cos(a) * r, y = cy + Math.sin(a) * r;
      if (!started) { ctx.moveTo(x, y); started = true; } else { ctx.lineTo(x, y); }
    }
    ctx.fillStyle = 'rgba(244,114,182,0.08)';
    ctx.fill();
    ctx.setLineDash([4, 4]);
    ctx.strokeStyle = 'rgba(244,114,182,0.5)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Dots + labels
  for (let i = 0; i < n; i++) {
    const a = -Math.PI / 2 + i * angleStep;
    const r = possessedPoints[i] * maxR;
    const x = cx + Math.cos(a) * r, y = cy + Math.sin(a) * r;
    // Glow
    ctx.beginPath(); ctx.arc(x, y, 6, 0, Math.PI * 2);
    ctx.fillStyle = colors[i % colors.length] + '30'; ctx.fill();
    // Dot
    ctx.beginPath(); ctx.arc(x, y, 3, 0, Math.PI * 2);
    ctx.fillStyle = colors[i % colors.length]; ctx.fill();
    // 己所向 dot
    if (aspPoints[i] > 0) {
      const ar = aspPoints[i] * maxR;
      const ax2 = cx + Math.cos(a) * ar, ay = cy + Math.sin(a) * ar;
      ctx.beginPath(); ctx.arc(ax2, ay, 2.5, 0, Math.PI * 2);
      ctx.fillStyle = '#f9a8d4'; ctx.fill();
    }
    // Label
    const lx = cx + Math.cos(a) * (maxR + 28), ly = cy + Math.sin(a) * (maxR + 28);
    ctx.fillStyle = '#e4e4f0'; ctx.font = '700 11px "Noto Sans SC"';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(axes[i].name, lx, ly);
  }

  // Legend mini
  const legY = size + 6;
  ctx.fillStyle = 'rgba(108,92,231,0.7)';
  ctx.fillRect(8, legY, 10, 3);
  ctx.fillStyle = '#fff'; ctx.font = '10px "Noto Sans SC"'; ctx.textAlign = 'left';
  ctx.fillText('己所能', 22, legY + 4);
  // 己所向 legend line
  ctx.beginPath(); ctx.moveTo(8, legY + 16); ctx.lineTo(18, legY + 16);
  ctx.setLineDash([4, 4]); ctx.strokeStyle = 'rgba(244,114,182,0.6)'; ctx.lineWidth = 2; ctx.stroke(); ctx.setLineDash([]);
  ctx.fillStyle = '#fff'; ctx.font = '10px "Noto Sans SC"';
  ctx.fillText('己所向', 22, legY + 20);
}

  window.location.href = '/api/schema/template';

async function uploadSchema(event) {
  const file = event.target.files[0];
  if (!file) return;
  const formData = new FormData();
  formData.append('file', file);
  try {
    const res = await fetch('/api/schema', {
      method: 'POST',
      credentials: 'same-origin',
      body: formData,
    });
    const data = await res.json();
    if (data.success) {
      toast('维度配置成功：' + data.message, 'success');
      loadSchemaStatus();
    } else {
      toast('上传失败：' + data.error, 'error');
    }
  } catch (e) {
    toast('上传失败：' + e.message, 'error');
  }
  event.target.value = '';
}

async function deleteSchema() {
  if (!confirm('确定要删除自定义维度配置吗？删除后将恢复 AI 自由生成模式。')) return;
  try {
    const res = await fetch('/api/schema', {
      method: 'DELETE',
      credentials: 'same-origin',
    });
    const data = await res.json();
    if (data.success) {
      toast('已恢复 AI 自由生成模式', 'success');
      loadSchemaStatus();
    } else {
      toast('删除失败：' + data.error, 'error');
    }
  } catch (e) {
    toast('删除失败：' + e.message, 'error');
  }
}

  const oldName = document.getElementById('editUserOldName').value;
  const newName = document.getElementById('editUserName').value.trim();
  const newPwd = document.getElementById('editUserPwd').value;

  if (!newName) return toast('用户名不能为空', 'error');

async function exportData() {
  try {
    const res = await fetch('/api/map/export');
    const blob = await res.blob();
    // Extract filename from Content-Disposition header
    const disposition = res.headers.get('Content-Disposition') || '';
    const match = disposition.match(/filename="?([^";\n]+)"?/);
    const filename = match ? match[1] : 'growth-lens-backup.json';
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = filename;
    link.click();
    URL.revokeObjectURL(url);
    toast('数据已导出', 'success');
  } catch (e) {
    toast('导出失败: ' + e.message, 'error');
  }
}

// ============ RESIZE HANDLES ============
function bindDeepthinkResize() {
  const gutter1 = document.getElementById('deepthinkGutter1');
  const gutter2 = document.getElementById('deepthinkGutter2');
  if (!gutter1 || !gutter2) return;

  let dragging = null;
  let startX = 0;
  let startLeftW = 0;
  let startMidW = 0;

  function onMouseMove(e) {
    if (!dragging) return;
    const dx = e.clientX - startX;
    const layout = document.getElementById('deepthinkLayout');
    if (!layout) return;
    const rect = layout.getBoundingClientRect();

    if (dragging === gutter1) {
      const newLeft = Math.max(180, Math.min(startLeftW + dx, rect.width - 500));
      document.getElementById('deepthinkLeft').style.width = newLeft + 'px';
      const newMid = Math.max(200, rect.width - newLeft - 280 - 16 * 2);
      document.getElementById('deepthinkMiddle').style.width = newMid + 'px';
    } else if (dragging === gutter2) {
      const newRight = Math.max(180, Math.min(500, rect.width - (startLeftW + startMidW + dx) - 16));
      document.getElementById('deepthinkRight').style.width = newRight + 'px';
    }
  }

  function onMouseUp() {
    if (dragging) {
      dragging.classList.remove('dragging');
      dragging = null;
      document.body.classList.remove('deepthink-resizing');
      document.removeEventListener('mousemove', onMouseMove);
      document.removeEventListener('mouseup', onMouseUp);
    }
  }

  [gutter1, gutter2].forEach(g => {
    g.addEventListener('mousedown', (e) => {
      dragging = g;
      startX = e.clientX;
      const leftEl = document.getElementById('deepthinkLeft');
      const midEl = document.getElementById('deepthinkMiddle');
      startLeftW = leftEl ? leftEl.offsetWidth : 300;
      startMidW = midEl ? midEl.offsetWidth : 400;
      g.classList.add('dragging');
      document.body.classList.add('deepthink-resizing');
      document.addEventListener('mousemove', onMouseMove);
      document.addEventListener('mouseup', onMouseUp);
    });
  });
}

function loadDeepthinkAnalysis() {
  const body = document.getElementById('deepthinkLeftBody');
  if (!body) return;
  const dims = mapData?.dimensions || [];

  if (dims.length === 0) {
    body.innerHTML = `
      <div class="deepthink-analysis-empty">
        <p>还没有分析数据。</p>
        <p>请先在「分析录音」中添加能力维度，再回到这里进行深度审计。</p>
      </div>`;
    return;
  }

  if (deepthinkAnalysis.content) {
    // Show regenerate button in header
    const regenBtn = document.getElementById('deepthinkRegenBtn');
    if (regenBtn) regenBtn.style.display = '';
    renderDeepthinkAnalysisContent(body, deepthinkAnalysis.content);
    return;
  }

  body.innerHTML = `
    <div style="font-size:13px;color:var(--text3);line-height:1.7;margin-bottom:16px">

      开始深度审计
    </button>`;
